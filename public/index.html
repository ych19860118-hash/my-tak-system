<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Web-TAK 數位地圖協作</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    const map = L.map('map').setView([25.0330, 121.5654], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const drawnItems = new L.FeatureGroup().addTo(map);
    const socket = io();
    
    // 登入邏輯：連線後才執行
    const username = prompt("請輸入您的名稱:");
    const room = prompt("請輸入房間號碼:");

    socket.on('connect', () => {
      socket.emit('join', { username, room });
    });

    // 繪圖控制
    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: { marker: true, polyline: true, polygon: true, circle: true, rectangle: true }
    });
    map.addControl(drawControl);

    // 當畫完圖形
    map.on(L.Draw.Event.CREATED, function (e) {
      const layer = e.layer;
      const id = Date.now().toString(); // 簡單 ID
      
      const shapeData = {
        id: id,
        type: e.layerType,
        // 抓取座標與屬性
        data: layer.toGeoJSON().geometry, 
        radius: layer.getRadius ? layer.getRadius() : null
      };

      drawnItems.addLayer(layer);
      socket.emit('shape:add', shapeData); // 發送到新 server.js
    });

    // 接收來自伺服器的圖形
    socket.on('shape:added', (shape) => {
      renderShape(shape);
    });

    function renderShape(shape) {
      let layer;
      if (shape.type === 'circle') {
        layer = L.circle(shape.data.coordinates.reverse(), { radius: shape.radius });
      } else if (shape.type === 'rectangle' || shape.type === 'polygon') {
        layer = L.polygon(shape.data.coordinates[0].map(c => c.reverse()));
      } else if (shape.type === 'marker') {
        layer = L.marker(shape.data.coordinates.reverse());
      }
      if (layer) layer.addTo(drawnItems);
    }
  </script>
</body>
</html>
