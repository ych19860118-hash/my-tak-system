<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Web-TAK 數位地圖協作</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
    #map { height: 100%; width: 100%; }
    #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; display:flex; justify-content:center; align-items:center; color:white; }
    .login-box { background: #333; padding: 20px; border-radius: 8px; text-align: center; }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2>Web-TAK 登入</h2>
      <input type="text" id="username" placeholder="輸入您的暱稱"><br><br>
      <input type="text" id="room" placeholder="輸入房間號碼"><br><br>
      <button onclick="login()">進入地圖</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    let map, drawnItems, socket;

    function login() {
      const username = document.getElementById('username').value;
      const room = document.getElementById('room').value;
      if(!username || !room) return alert('請輸入完整資訊');
      
      document.getElementById('login-overlay').style.display = 'none';
      initApp(username, room);
    }

    function initApp(username, room) {
      map = L.map('map').setView([25.0330, 121.5654], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      
      // 確保 drawnItems 被定義且加入地圖
      drawnItems = new L.FeatureGroup().addTo(map);
      socket = io();

      socket.emit('join', { username, room });

      // 繪圖工具：關鍵在於 featureGroup 必須是上面那個 drawnItems
      const drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems }, 
        draw: { marker: true, polyline: true, polygon: true, circle: true, rectangle: true }
      });
      map.addControl(drawControl);

      // 當圖形繪製完成
      map.on(L.Draw.Event.CREATED, function (e) {
        const layer = e.layer;
        const id = Date.now().toString();
        layer.options.id = id;
        
        // 【關鍵】將圖層加入 drawnItems，編輯器才能偵測到它
        drawnItems.addLayer(layer);
        
        const shapeData = {
          id: id,
          type: e.layerType,
          data: layer.toGeoJSON().geometry,
          radius: layer.getRadius ? layer.getRadius() : null,
          properties: { name: "新物件", color: "#3388ff" }
        };
        
        socket.emit('shape:add', shapeData);
      });

      // 編輯完成後的同步
      map.on('draw:edited', function (e) {
        e.layers.eachLayer(function (layer) {
          socket.emit('shape:update', {
            id: layer.options.id,
            data: layer.toGeoJSON().geometry,
            radius: layer.getRadius ? layer.getRadius() : null
          });
        });
      });
    }
  </script>
</body>
</html>
