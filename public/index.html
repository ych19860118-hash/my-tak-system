<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web-TAK 數位地圖協作</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet.draw CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
    #map { height: 100%; width: 100%; }
    #status { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="status">Web-TAK 伺服器連線中...</div>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet.draw JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <!-- milsymbol (如需軍事符號) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/milsymbol/2.0.0/milsymbol.js"></script>
  <!-- socket.io client（由 server 提供路徑 /socket.io/socket.io.js） -->
  <script src="/socket.io/socket.io.js"></script>

  <script>
    // 建立地圖
    const map = L.map('map').setView([25.0330, 121.5654], 13); // 預設台北市中心

    // 加入 OSM 磁磚
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Leaflet.draw 控制器
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: {
        marker: true,
        polyline: false,
        polygon: false,
        circle: false,
        rectangle: false,
        circlemarker: false
      }
    });
    map.addControl(drawControl);

    // Socket.IO 連線
    const socket = io(); // 使用相同 origin 連線

    const statusEl = document.getElementById('status');
    function setStatus(text) { statusEl.textContent = text; }

    socket.on('connect', () => {
      setStatus('已連線，ID: ' + socket.id);
    });
    socket.on('disconnect', () => setStatus('已斷線'));
    socket.on('connect_error', (err) => setStatus('連線錯誤'));

    // 本地維護的 markers map: id -> layer
    const localMarkers = {};

    // helper: 建立 Leaflet marker 並綁事件
    function createMarkerFromData(data, emitEvents = false) {
      const { id, lat, lng, properties } = data;
      const m = L.marker([lat, lng], { draggable: true });
      m.addTo(drawnItems);

      m.on('dragend', () => {
        const pos = m.getLatLng();
        const updated = { id, lat: pos.lat, lng: pos.lng, properties: properties || {} };
        // 更新本地資料
        localMarkers[id] = m;
        // 向 server 廣播更新
        socket.emit('marker:update', updated);
      });

      // 若需要點擊顯示屬性
      m.on('click', () => {
        const p = properties || {};
        const html = '<div><strong>ID:</strong> ' + id + '</div>' +
                     (p.label ? ('<div><strong>Label:</strong> ' + p.label + '</div>') : '');
        m.bindPopup(html).openPopup();
      });

      localMarkers[id] = m;
      return m;
    }

    // 產生唯一 id（簡易）
    function genId() {
      return 'm_' + Date.now().toString(36) + '_' + Math.floor(Math.random()*10000).toString(36);
    }

    // 處理 draw:created 事件（使用者新增標記）
    map.on(L.Draw.Event.CREATED, function (e) {
      const layer = e.layer;
      if (e.layerType === 'marker') {
        const latlng = layer.getLatLng();
        const id = genId();
        const markerData = { id, lat: latlng.lat, lng: latlng.lng, properties: { label: 'user' } };
        // 把 layer 轉到我們的 drawnItems 管理與本地 map
        layer.remove();
        createMarkerFromData(markerData);
        // 發送給 server
        socket.emit('marker:add', markerData);
      }
    });

    // 初始拿取 server 上所有 markers（備援 API）
    fetch('/api/markers').then(r => r.json()).then(list => {
      list.forEach(m => {
        // 避免重複建立（若 socket 也會送 init）
        if (!localMarkers[m.id]) createMarkerFromData(m);
      });
    }).catch(()=>{ /* 忽略 fetch 錯誤 */ });

    // Socket event handlers：server 廣播來的變更
    socket.on('init-markers', (list) => {
      // 先清空現有（不移除使用者建立中的 layer）
      Object.keys(localMarkers).forEach(k => {
        try { drawnItems.removeLayer(localMarkers[k]); } catch(e){}
      });
      Object.keys(localMarkers).forEach(k => delete localMarkers[k]);

      (list || []).forEach(m => {
        if (!localMarkers[m.id]) createMarkerFromData(m);
      });
    });

    socket.on('marker:added', (m) => {
      if (!localMarkers[m.id]) createMarkerFromData(m);
    });

    socket.on('marker:updated', (m) => {
      const layer = localMarkers[m.id];
      if (layer) {
        layer.setLatLng([m.lat, m.lng]);
      } else {
        createMarkerFromData(m);
      }
    });

    socket.on('marker:removed', (id) => {
      const layer = localMarkers[id];
      if (layer) {
        drawnItems.removeLayer(layer);
        delete localMarkers[id];
      }
    });
  </script>
</body>
</html>
