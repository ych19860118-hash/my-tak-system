<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戰術防災分組協同即時地圖</title>
    <link rel="stylesheet" href="/leaflet/leaflet.css" />
    <script src="/socket.io/socket.io.js"></script>
    <script src="/leaflet/leaflet.js"></script>
    <style>
        /* 💡 戰術雷達網格花紋背景：每 30 像素產生一條微弱的螢光綠電子定位線，防刺眼且極具戰術高質感 */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Courier New', Courier, monospace, sans-serif; 
            background-color: #0b0c0e; 
            background-image: 
                linear-gradient(rgba(34, 197, 94, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 197, 94, 0.04) 1px, transparent 1px);
            background-size: 30px 30px; background-position: center;
        }
        #map { width: 100%; height: 100vh; display: none; background: #111214; } 
        
        /* 軍用雷達戰術風登入艙 */
        #login-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #141619; padding: 40px 30px; border-radius: 4px; 
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.15); text-align: center; z-index: 2000;
            border: 2px solid #22c55e; width: 310px;
        }
        #login-box h2 { 
            color: #22c55e; margin-bottom: 25px; font-weight: bold; font-size: 20px; 
            letter-spacing: 2px; text-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            text-transform: uppercase;
        }
        #login-box input, #login-box select { 
            display: block; margin: 14px auto; padding: 12px; width: 92%; 
            background: #1a1d21; border: 1px solid #2d3748; border-radius: 2px; 
            color: #39ff14; font-size: 14px; outline: none; box-sizing: border-box;
            font-family: monospace; transition: all 0.2s;
        }
        #login-box input:focus, #login-box select:focus { 
            border-color: #39ff14; box-shadow: 0 0 8px rgba(57, 255, 20, 0.3);
        }
        #login-box button { 
            width: 92%; padding: 12px; background: #1b4d22; color: #39ff14; 
            border: 1px solid #39ff14; border-radius: 2px; cursor: pointer; font-size: 15px; 
            font-weight: bold; margin-top: 15px; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); transition: all 0.2s;
        }
        #login-box button:hover { 
            background: #22c55e; color: #0d0e10; box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }
        #login-error { color: #ef4444; font-size: 13px; margin-top: 12px; min-height: 20px; font-weight: bold; }
        /* 側邊極簡向量垂直工具列 */
        #custom-toolbar {
            position: absolute; top: 25px; left: 12px; z-index: 1000; display: none; flex-direction: column; gap: 10px;
        }
        .tool-btn {
            width: 44px !important; height: 44px !important; background: #141619 !important; background-image: none !important;
            border: 1px solid #2d3748 !important; border-radius: 4px !important; cursor: pointer;
            display: flex !important; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin: 0 !important; padding: 0 !important; touch-action: button;
        }
        .tool-btn svg { stroke: #a0aec0 !important; }
        .tool-btn:hover { background: #1a1d21 !important; border-color: #4a5568 !important; }
        .tool-btn.active { background: #22c55e !important; border-color: #39ff14 !important; }
        .tool-btn.active svg, #btn-locate.active svg { stroke: #0d0e10 !important; }
        
        .popup-menu { font-size: 13px; min-width: 180px; font-family: monospace; }
        .popup-menu input[type="text"] { width: 90%; padding: 4px; margin-bottom: 8px; background: #f7fafc; border: 1px solid #cbd5e0; }
        .popup-menu select { width: 96%; padding: 4px; margin-bottom: 8px; }
        .popup-menu button { width: 100%; padding: 6px; background: #e53e3e; color: white; border: none; border-radius: 2px; cursor: pointer; }
        .control-pin-icon { font-size: 20px; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,0.5); cursor: move; }
        
        /* ℹ️ 戰術終端機人數面板隱藏標籤 */
        #toggle-info-btn {
            position: absolute; bottom: 20px; right: 12px; z-index: 1001;
            width: 38px; height: 34px; background: #141619; 
            border: 1px solid #2d3748; border-radius: 4px; cursor: pointer; 
            font-size: 15px; color: #22c55e; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #toggle-info-btn:hover { border-color: #22c55e; }
        #typhoon-info {
            position: absolute; bottom: 65px; right: 12px; background: #141619;
            padding: 15px; border-radius: 4px; color: #a0aec0; z-index: 1000;
            border: 1px solid #22c55e; font-size: 12px; display: none !important;
            max-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); line-height: 1.6;
        }

        /* 💡 強化戰術常駐標籤，融入發光綠框、字體強力加粗且置於最高圖層，絕對不被覆蓋吃掉 */
        .tactical-tooltip {
            background: #141619 !important; border: 2px solid #39ff14 !important;
            color: #39ff14 !important; font-weight: 900 !important; font-size: 13px !important;
            font-family: 'Courier New', monospace !important; border-radius: 4px !important;
            padding: 5px 10px !important; box-shadow: 0 0 12px rgba(57, 255, 20, 0.4) !important;
            opacity: 1 !important; z-index: 10000 !important;
        }
        .tactical-tooltip::before { display: none !important; }
    </style>
</head>
<body>
    <!-- COP SYSTEM 災害情資平台：戰術風應變登入艙介面 -->
    <div id="login-box">
        <h2>COP SYSTEM情資平台</h2>
        <input type="text" id="username" placeholder="OPERATOR ID (暱稱)">
        
        <select id="room-select" onchange="checkRoomType()">
            <option value="public_1">公開頻道(風災)</option>
            <option value="public_2">公開頻道(震災)</option>
            <option value="custom">新增私人指管頻道...</option>
        </select>
        
        <input type="text" id="custom-room-name" placeholder="ENTER NEW ROOM ID" style="display:none;">
        <input type="password" id="room-password" placeholder="SECURE ACCESS KEY (密碼)">
        <button onclick="login()">進入情資地圖</button>
        <p id="login-error"></p>
    </div>

    <!-- 自製左側極簡細線垂直工具列 -->
    <div id="custom-toolbar">
        <!-- 1. 標記點 -->
        <button class="tool-btn" id="btn-marker" onclick="switchTool('marker')" title="新增回報點">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
        </button>
        <!-- 2. 線條 -->
        <button class="tool-btn" id="btn-polyline" onclick="switchTool('polyline')" title="繪製線條">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12h5l4 8 5-16 4 8"></path>
            </svg>
        </button>
        <!-- 3. 方形 -->
        <button class="tool-btn" id="btn-rectangle" onclick="switchTool('rectangle')" title="繪製方形">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            </svg>
        </button>
        <!-- 4. 圓形 -->
        <button class="tool-btn" id="btn-circle" onclick="switchTool('circle')" title="繪製圓形">
            <svg width="22" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
            </svg>
        </button>
        <!-- 5. 多邊形 -->
        <button class="tool-btn" id="btn-polygon" onclick="switchTool('polygon')" title="繪製多邊形">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
            </svg>
        </button>
        <!-- 6. 🛰️ 戰術 GPS 雷達定位按鈕 -->
        <button class="tool-btn" id="btn-locate" onclick="locateUserGPS()" title="我的戰術 GPS 定位" style="margin-top: 15px !important; background: #1a1d21 !important; border-color: #22c55e !important;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="3"></circle>
                <line x1="12" y1="1" x2="12" y2="4"></line>
                <line x1="12" y1="20" x2="12" y2="23"></line>
                <line x1="1" y1="12" x2="4" y2="12"></line>
                <line x1="20" y1="12" x2="23" y2="12"></line>
            </svg>
        </button>
    </div>

    <!-- ℹ️ 戰術終端機人數面板隱藏標籤 -->
    <button id="toggle-info-btn" onclick="toggleStatusPanel()">ℹ</button>
    <div id="typhoon-info">
        <b style="color: #22c55e; font-size: 13px; letter-spacing: 1px;">NET NODE: <span id="state-room" style="color:#39ff14;"></span></b>
        <div style="margin-top: 8px;">
            STATUS: <b style="color:#39ff14;">ACTIVE</b><br>
            ONLINE MARSHALS: <b id="state-count" style="color:#39ff14; font-size:14px;">0</b><br>
            <span style="color:#718096; font-size:10px; display:block; margin-top:5px; line-height:1.4;">[SYS_WARN] Auto-wipe sequence triggers after 10 mins of total room vacancy.</span>
        </div>
    </div>
    <div id="map"></div>
    <script>
        const SERVER_URL = window.location.origin; 
        let socket, currentUser = "", currentRoom = "", map, allMapLayers = {};
        let currentTool = "pan", tempPoints = [], tempShape = null;

        // 💡 災情時效黑科技：自動抓取當前系統時間，格式化為直覺的「月/日 時:分」
        function getFormattedTime() {
            const now = new Date();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            return `${m}/${d} ${h}:${min}`;
        }

        function checkRoomType() {
            const select = document.getElementById('room-select').value;
            const customInput = document.getElementById('custom-room-name');
            if (select === 'custom') customInput.style.display = 'block';
            else customInput.style.display = 'none';
        }

        function initMapInstance() {
            if (map) return; 
            
            // 💡 建立白天版地圖實例並關閉雙擊放大，同時加上 zoomControl: false 拿掉原生縮放鈕
            map = L.map('map', { doubleClickZoom: false, zoomControl: false }).setView([23.6, 121], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

            // 將左側工具列位置微調抬高，符合戰術抬頭顯示器（HUD）的緊湊排版
            document.getElementById('custom-toolbar').style.top = '25px';

            const toolbarDiv = document.getElementById('custom-toolbar');
            L.DomEvent.disableClickPropagation(toolbarDiv);
            L.DomEvent.disableScrollPropagation(toolbarDiv);

            map.on('dblclick', function() {
                const docElm = document.documentElement;
                const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

                if (!isFullscreen) {
                    if (docElm.requestFullscreen) docElm.requestFullscreen();
                    else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen(); 
                    else if (docElm.mozRequestFullScreen) docElm.mozRequestFullScreen();
                    else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); 
                    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                    else if (document.msExitFullscreen) document.msExitFullscreen();
                }
            });

            const resizeEvents = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
            resizeEvents.forEach(evt => {
                document.addEventListener(evt, () => {
                    setTimeout(() => { if (map) map.invalidateSize(); }, 300);
                });
            });

            initDrawingEvents();
        }

        function switchTool(tool) {
            currentTool = tool; 
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if (tempShape) { map.removeLayer(tempShape); tempShape = null; } 
            tempPoints = [];
            if (tool !== 'pan' && tool !== 'locate') { 
                const id = 'btn-' + tool; 
                if (document.getElementById(id)) document.getElementById(id).classList.add('active'); 
            }
        }
        function initDrawingEvents() {
            map.on('click', function(e) {
                const lat = e.latlng.lat, lng = e.latlng.lng;
                
                if (currentTool === 'marker') {
                    const msg = prompt("請輸入災情或回報狀況說明：") || "未命名災情";
                    const data = {
                        id: 'obj_' + Date.now(), shapeType: "marker", coordinates: [lat, lng],
                        message: msg, creator: currentUser, color: "#3388ff",
                        time: getFormattedTime() 
                    };
                    renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                } else if (currentTool === 'polyline') {
                    tempPoints.push([lat, lng]);
                    if (tempPoints.length === 1) tempShape = L.polyline(tempPoints, {color: '#3388ff', weight: 6}).addTo(map);
                    else tempShape.setLatLngs(tempPoints);
                    if (tempPoints.length >= 2) tempShape.bindTooltip("右鍵結束繪製", {permanent: true}).openTooltip();
                } else if (currentTool === 'rectangle') {
                    tempPoints.push([lat, lng]);
                    if (tempPoints.length === 2) {
                        const msg = prompt("請輸入該封鎖區域說明：") || "未命名區域";
                        const data = {
                            id: 'obj_' + Date.now(), shapeType: "rectangle", coordinates: JSON.parse(JSON.stringify(tempPoints)), 
                            message: msg, creator: currentUser, color: "#3388ff",
                            time: getFormattedTime() 
                        };
                        renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                    }
                } else if (currentTool === 'circle') {
                    if (tempPoints.length === 0) {
                        tempPoints.push({ lat: lat, lng: lng });
                        tempShape = L.circle([lat, lng], {radius: 100, color: '#3388ff'}).addTo(map);
                    } else if (tempPoints.length === 1) {
                        const firstPoint = tempPoints.shift(); 
                        const centerPoint = L.latLng(firstPoint.lat, firstPoint.lng);
                        const edgePoint = L.latLng(lat, lng);
                        const radius = map.distance(centerPoint, edgePoint);
                        const msg = prompt("請輸入圓形影響範圍說明：") || "未命名圓形區域";
                        const data = {
                            id: 'obj_' + Date.now(), shapeType: "circle", coordinates: [firstPoint.lat, firstPoint.lng], 
                            radius: radius, message: msg, creator: currentUser, color: "#3388ff",
                            time: getFormattedTime() 
                        };
                        if (tempShape) map.removeLayer(tempShape); 
                        renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                    }
                } else if (currentTool === 'polygon') {
                    tempPoints.push([lat, lng]);
                    if (tempPoints.length === 1) tempShape = L.polyline(tempPoints, {color: '#3388ff'}).addTo(map);
                    else tempShape.setLatLngs(tempPoints);
                    if (tempPoints.length >= 3) tempShape.bindTooltip("右鍵結束繪製", {permanent: true}).openTooltip();
                }
            });

            map.on('contextmenu', function() {
                if (currentTool === 'polyline' && tempPoints.length >= 2) {
                    const msg = prompt("請輸入封路/積水線條說明：") || "未命名線條";
                    const data = {
                        id: 'obj_' + Date.now(), shapeType: "polyline", coordinates: JSON.parse(JSON.stringify(tempPoints)),
                        message: msg, creator: currentUser, color: "#3388ff",
                        time: getFormattedTime() 
                    };
                    if (tempShape) map.removeLayer(tempShape); renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                } else if (currentTool === 'polygon' && tempPoints.length >= 3) {
                    const msg = prompt("請輸入淹水區域範圍說明：") || "未命名多邊形";
                    const data = {
                        id: 'obj_' + Date.now(), shapeType: "polygon", coordinates: JSON.parse(JSON.stringify(tempPoints)),
                        message: msg, creator: currentUser, color: "#3388ff",
                        time: getFormattedTime() 
                    };
                    if (tempShape) map.removeLayer(tempShape); renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                }
            });
        }

        async function login() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('room-password').value;
            const roomSel = document.getElementById('room-select').value;
            const customRoom = document.getElementById('custom-room-name').value.trim();
            let targetRoom = roomSel === 'custom' ? customRoom : roomSel;

            if(!userIn) { document.getElementById('login-error').innerText = "請輸入您的通報暱稱！"; return; }
            if(roomSel === 'custom' && !customRoom) { document.getElementById('login-error').innerText = "請輸入自訂房間名稱！"; return; }
            
            try {
                const res = await fetch(`${SERVER_URL}/api/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: userIn, roomPassword: passIn, roomName: targetRoom })
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = data.username; currentRoom = data.roomName;
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('map').style.display = 'block'; 
                    document.getElementById('custom-toolbar').style.display = 'flex'; 
                    document.getElementById('toggle-info-btn').style.display = 'flex';
                    document.getElementById('state-room').innerText = currentRoom;
                    initMapInstance(); setTimeout(() => { if (map) map.invalidateSize(); }, 300); initSocketAndLayers(); 
                } else { document.getElementById('login-error').innerText = data.message; }
            } catch (err) { document.getElementById('login-error').innerText = "連線後端錯誤！"; }
        }
        function initSocketAndLayers() {
            socket = io(SERVER_URL);
            socket.emit('join_room', { roomName: currentRoom, username: currentUser });

            socket.on('history_objects', function(objects) {
                if (Array.isArray(objects)) {
                    objects.forEach(obj => renderObjectOnMap(obj));
                }
            });

            socket.on('update_user_count', function(count) {
                document.getElementById('state-count').innerText = count;
            });

            // 💡【核心防護】：將別人位置的戰術標籤「直接綁在核心小圓點」身上，徹底攻克 ID 標籤被隱藏的容器衝突！
            let peerGPSMarkers = {}; 
            socket.on('peer_gps_updated', function(gpsData) {
                const pName = gpsData.username;
                const pLatLng = L.latLng(gpsData.lat, gpsData.lng);
                
                // 1. 防呆：如果地圖上已有該隊員的老定位點，先從地圖上拔除
                if (peerGPSMarkers[pName]) {
                    map.removeLayer(peerGPSMarkers[pName]);
                }
                
                // 2. 建立隊員的核心綠色小圓點，並【直接在小圓點身上】綁定永久顯示的發光戰術標籤
                const peerCenterDot = L.circle(pLatLng, { 
                    radius: 10, color: '#39ff14', fillColor: '#39ff14', fillOpacity: 0.8, weight: 1 
                }).bindTooltip(`${pName} 🛰️`, { 
                    permanent: true, direction: 'top', className: 'tactical-tooltip' 
                });
                
                // 3. 建立外圍的半透明精度誤差圈
                const peerAccuracyCircle = L.circle(pLatLng, { 
                    radius: gpsData.accuracy, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.1, weight: 1 
                });

                // 4. 將兩個向量實體打包並一併畫上地圖，寫入快取中
                peerGPSMarkers[pName] = L.layerGroup([peerCenterDot, peerAccuracyCircle]).addTo(map);
            });

            socket.on('object_added', data => renderObjectOnMap(data));
            socket.on('object_deleted', id => {
                if (allMapLayers[id]) {
                    map.removeLayer(allMapLayers[id].layer);
                    if (allMapLayers[id].pin) map.removeLayer(allMapLayers[id].pin);
                    delete allMapLayers[id];
                }
            });
        }

        function renderObjectOnMap(data) {
            if (allMapLayers[data.id]) return;
            let mainLayer, centerLatLng, isMyObject = (data.creator === currentUser);
            const pts = data.coordinates;

            if (data.shapeType === "marker") {
                mainLayer = L.marker(pts); centerLatLng = L.latLng(pts);
            } else if (data.shapeType === "polyline") {
                mainLayer = L.polyline(pts, { color: data.color, weight: 6, interactive: true, bundlingMouseEvents: false });
                centerLatLng = L.polyline(pts).getBounds().getCenter();
            } else if (data.shapeType === "rectangle") {
                mainLayer = L.rectangle(pts, { color: data.color, fillColor: data.color, fillOpacity: 0.4, weight: 4 });
                centerLatLng = L.rectangle(pts).getBounds().getCenter();
            } else if (data.shapeType === "circle") {
                mainLayer = L.circle(pts, { radius: data.radius, color: data.color, fillColor: data.color, fillOpacity: 0.4, weight: 4 });
                centerLatLng = L.latLng(pts);
            } else if (data.shapeType === "polygon") {
                mainLayer = L.polygon(pts, { color: data.color, fillColor: data.color, fillOpacity: 0.4, weight: 4 });
                centerLatLng = L.polygon(pts).getBounds().getCenter();
            }
            if (!mainLayer) return;
            mainLayer.addTo(map);

            allMapLayers[data.id] = { layer: mainLayer, pin: null };

            // 💡 在地圖幾何圖形正中央綁定常駐型黑底綠字標籤，24小時不需點擊直接秀出情資
            mainLayer.bindTooltip(data.message, { permanent: true, direction: 'center', className: 'tactical-tooltip' });

            // 📌 錨點流暢拖曳平移與時間連動算法
            if (isMyObject && data.shapeType !== "marker") {
                const controlPin = L.marker(centerLatLng, {
                    draggable: true,
                    icon: L.divIcon({ html: '📌', className: 'control-pin-icon' })
                }).addTo(map);
                allMapLayers[data.id].pin = controlPin;

                let startLatLng = centerLatLng;
                controlPin.on('drag', function(e) {
                    const nextLatLng = e.latlng;
                    const offsetLat = nextLatLng.lat - startLatLng.lat;
                    const offsetLng = nextLatLng.lng - startLatLng.lng;

                    if (data.shapeType === "circle") { mainLayer.setLatLng(nextLatLng); } 
                    else if (data.shapeType === "rectangle") {
                        const b = mainLayer.getBounds();
                        mainLayer.setBounds([[b.getSouthWest().lat + offsetLat, b.getSouthWest().lng + offsetLng], [b.getNorthEast().lat + offsetLat, b.getNorthEast().lng + offsetLng]]);
                    } else if (mainLayer.getLatLngs) {
                        const movePoints = function(points) { return points.map(p => { if (Array.isArray(p)) return movePoints(p); return L.latLng(p.lat + offsetLat, p.lng + offsetLng); }); };
                        mainLayer.setLatLngs(movePoints(mainLayer.getLatLngs()));
                    }
                    startLatLng = nextLatLng; 
                });

                controlPin.on('dragend', function() {
                    if (data.shapeType === "circle") { data.coordinates = [mainLayer.getLatLng().lat, mainLayer.getLatLng().lng]; } 
                    else if (data.shapeType === "rectangle") {
                        const b = mainLayer.getBounds(); data.coordinates = [[b.getSouthWest().lat, b.getSouthWest().lng], [b.getNorthEast().lat, b.getNorthEast().lng]];
                    } else if (mainLayer.getLatLngs) {
                        const dumpPoints = function(points) { return points.map(p => { if (Array.isArray(p)) return dumpPoints(p); return [p.lat, p.lng]; }); };
                        data.coordinates = dumpPoints(mainLayer.getLatLngs());
                    }
                    data.time = getFormattedTime(); // 移動完成重寫最後異動時間
                    socket.emit('delete_object', data.id); socket.emit('new_object', data);
                });
            } else if (isMyObject && data.shapeType === "marker") {
                mainLayer.dragging.enable();
                mainLayer.on('dragend', function() {
                    data.coordinates = [mainLayer.getLatLng().lat, mainLayer.getLatLng().lng];
                    data.time = getFormattedTime(); // 移動大頭針完成時重寫最後異動時間
                    socket.emit('delete_object', data.id); socket.emit('new_object', data);
                });
            }

            // 🔒 獨立權限 Popup 對話框判定分流
            let popupContent = "";
            const displayTime = data.time || "無紀錄";
            if (isMyObject) {
                const isMarker = (data.shapeType === "marker");
                popupContent = `
                    <div class="popup-menu">
                        <b>編輯您回報的災情</b><br>
                        <small style="color:#22c55e;">最後異動時間：${displayTime}</small><br><br>
                        <label>修改描述：</label>
                        <input type="text" id="edit-msg-${data.id}" value="${data.message}">
                        <div style="${isMarker ? 'display: none;' : ''}">
                            <label>等級變更：</label>
                            <select id="edit-color-${data.id}">
                                <option value="#3388ff" ${data.color === '#3388ff'?'selected':''}>藍色 (一般回報)</option>
                                <option value="#dc3545" ${data.color === '#dc3545'?'selected':''}>紅色 (嚴重中斷/火災)</option>
                                <option value="#28a745" ${data.color === '#28a745'?'selected':''}>綠色 (已搶通/通行)</option>
                                <option value="#ffc107" ${data.color === '#ffc107'?'selected':''}>黃色 (積水/警告)</option>
                            </select>
                        </div>
                        <button onclick="updateObject('${data.id}')" style="background:#007bff; margin-bottom:5px;">儲存修改</button>
                        <button onclick="deleteObject('${data.id}')">撤銷此回報</button>
                    </div>`;
            } else {
                popupContent = `
                    <div class="popup-menu">
                        <b style="color:#ffc107;">⚠️ 災情回報狀況</b><br>
                        <small style="color:gray;">通報時間：${displayTime}</small><br><br>
                        <b>內容：</b>${data.message}<br>
                        <small style="color:gray;">回報人員身分: ${data.creator}</small><br><br>
                        <small style="color:#ff4d4d;">🔒 唯讀模式：您非創作者，無法修改此處。</small>
                    </div>`;
            }
            mainLayer.bindPopup(popupContent);
        }

        function deleteObject(objectId) {
            if (confirm("確定要撤銷這個災情回報嗎？")) {
                if (allMapLayers[objectId]) {
                    map.removeLayer(allMapLayers[objectId].layer);
                    if (allMapLayers[objectId].pin) map.removeLayer(allMapLayers[objectId].pin);
                    delete allMapLayers[objectId];
                }
                socket.emit('delete_object', objectId);
            }
        }

        // 💡【終極重寫完全體】：抓取最新拉拉動半徑與外框，支援圓形半徑、方形外框、多邊形 📌 錨點儲存後無限次二次調整大小與平移
        function updateObject(objectId) {
            const newMsg = document.getElementById(`edit-msg-${objectId}`).value.trim();
            const newColor = document.getElementById(`edit-color-${objectId}`).value;
            
            if (allMapLayers[objectId]) {
                const layerGroup = allMapLayers[objectId];
                
                const isMarker = (layerGroup.layer instanceof L.Marker);
                const isCircle = !isMarker && !!layerGroup.layer.options.radius;
                const isRect = !isMarker && !isCircle && layerGroup.layer.getBounds && typeof layerGroup.layer.getLatLngs !== 'function';
                
                let sType = "polygon";
                if (isMarker) sType = "marker";
                else if (isCircle) sType = "circle";
                else if (isRect) sType = "rectangle";
                else if (layerGroup.layer instanceof L.Polyline && !(layerGroup.layer instanceof L.Polygon)) sType = "polyline";

                let currentCoordinates = null;
                let currentRadius = null;

                if (isMarker) {
                    currentCoordinates = [layerGroup.layer.getLatLng().lat, layerGroup.layer.getLatLng().lng];
                } else if (isCircle) {
                    currentCoordinates = [layerGroup.layer.getLatLng().lat, layerGroup.layer.getLatLng().lng];
                    currentRadius = layerGroup.layer.getRadius(); // 💡 抓取當前最新被拉大或縮小的半徑！
                } else if (isRect) {
                    const b = layerGroup.layer.getBounds();
                    currentCoordinates = [[b.getSouthWest().lat, b.getSouthWest().lng], [b.getNorthEast().lat, b.getNorthEast().lng]];
                } else {
                    const dumpPoints = function(points) {
                        return points.map(p => { if (Array.isArray(p)) return dumpPoints(p); return [p.lat, p.lng]; });
                    };
                    currentCoordinates = dumpPoints(layerGroup.layer.getLatLngs());
                }

                const updatedData = {
                    id: objectId, shapeType: sType,
                    coordinates: currentCoordinates, radius: currentRadius,
                    message: newMsg, color: newColor, creator: currentUser,
                    time: getFormattedTime() 
                };

                map.removeLayer(layerGroup.layer);
                if (layerGroup.pin) map.removeLayer(layerGroup.pin);
                delete allMapLayers[objectId];

                renderObjectOnMap(updatedData);
                socket.emit('delete_object', objectId); socket.emit('new_object', updatedData);
            }
        }

        function toggleStatusPanel() {
            const panel = document.getElementById('typhoon-info');
            if (window.getComputedStyle(panel).display === 'none') {
                panel.style.setProperty('display', 'block', 'important');
            } else {
                panel.style.setProperty('display', 'none', 'important');
            }
        }

        // 💡 索取本機 GPS，畫出自己綠色追蹤圈（整合自己也永久看得到 ID），並同步透過 Socket 廣播分發座標給全房間
        let myLocationMarker = null;
        function locateUserGPS() {
            if (!navigator.geolocation) {
                alert("錯誤：您的手機瀏覽器不支援 GPS 定位功能！"); return;
            }
            const locateBtn = document.getElementById('btn-locate');
            locateBtn.style.background = '#22c55e';

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    const currentLatLng = L.latLng(userLat, userLng);

                    if (myLocationMarker) map.removeLayer(myLocationMarker);

                    // 1. 建立自己的核心綠色小圓點，並【直接在小圓點身上】綁定永久顯示的發光戰術標籤
                    const myCenterDot = L.circle(currentLatLng, { 
                        radius: 10, color: '#39ff14', fillColor: '#39ff14', fillOpacity: 0.9, weight: 1 
                    }).bindTooltip(`${currentUser} (您) 🛰️`, { 
                        permanent: true, direction: 'top', className: 'tactical-tooltip' 
                    });

                    // 2. 建立自己外圍的半透明精度誤差圈
                    const myAccuracyCircle = L.circle(currentLatLng, { 
                        radius: accuracy, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.15, weight: 1 
                    });

                    // 3. 將兩個向量實體打包並一併畫上地圖，寫入快取中
                    myLocationMarker = L.layerGroup([myCenterDot, myAccuracyCircle]).addTo(map);

                    // 4. 視角大推移平移
                    map.setView(currentLatLng, 15, { animate: true, duration: 1.5 });
                    
                    // ⚡【核心廣播黑科技】：定位成功當下，秒級向房間廣播：「我小明在線，小圓點釘在這邊！」
                    if (socket) {
                        socket.emit('share_my_gps', { lat: userLat, lng: userLng, accuracy: accuracy });
                    }

                    locateBtn.style.background = '#141619';
                },
                function(error) {
                    locateBtn.style.background = '#141619';
                    if (error.code === error.PERMISSION_DENIED) {
                        alert("定位失敗：請進入手機系統設定，允許瀏覽器使用您的「位置權限」！");
                    } else {
                        alert("定位失敗：GPS 訊號微弱或超時，請移至窗邊或戶外重試。");
                    }
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        }
    </script>
