<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-TAK 戰術指揮終端</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; background-color: #000; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* 1. 左下：線上隊員 */
        .status-panel { position: absolute; bottom: 10px; left: 10px; z-index: 10; background: rgba(0, 20, 20, 0.85); border: 1px solid #00ffcc; padding: 8px; border-radius: 4px; color: #00ffcc; font-size: 10px; width: 150px; }
        
        /* 2. 正下方：座標顯示 */
        .bottom-center-panel { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.7); color: #fff; padding: 5px 15px; font-size: 10px; border: 1px solid #444; border-radius: 4px; pointer-events: none; }

        /* 3. 右下：工具按鈕 */
        .bottom-right-panel { position: absolute; bottom: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }

        /* 4. 右邊：功能按鈕 */
        .right-side-panel { position: absolute; top: 70px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 5px; }

        /* 5. 正上方：隱藏式繪圖選單 */
        .top-draw-menu { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 5px; background: rgba(10, 15, 25, 0.9); padding: 5px; border-radius: 4px; border: 1px solid #00ffcc; }

        .btn { height: 35px; padding: 0 10px; background: #141e28; border: 1px solid #556677; color: #fff; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 4px; }
        .btn:hover, .btn.active { border-color: #00ffcc; color: #00ffcc; }
        .btn-clear { border-color: #e74c3c; color: #e74c3c; }
        .select-input { height: 30px; background: #141e28; border: 1px solid #556677; color: #fff; font-size: 10px; width: 85px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>WEB-TAK 戰術登入</h2>
            <input type="text" id="user-callsign" class="login-input" value="ALPHA-01">
            <select id="room-type-select" class="select-input"><option value="PUBLIC_01">公開房 01</option><option value="PUBLIC_02">公開房 02</option></select>
            <button class="login-btn" onclick="joinTacticalNetwork()">連線進入系統</button>
        </div>
    </div>

    <div id="map"></div>
    
    <div class="top-draw-menu">
        <button class="btn" id="btn-circle" onclick="setMode('circle')">⭕ 圓形</button>
        <button class="btn" id="btn-rect" onclick="setMode('rect')">⬜ 方形</button>
        <button class="btn" id="btn-poly" onclick="setMode('poly')">⬡ 多邊形</button>
        <button class="btn" id="btn-line" onclick="setMode('line')">📈 線條</button>
    </div>

    <div class="right-side-panel">
        <select id="mil-branch-select" class="select-input"><option value="ST----">步兵</option><option value="UC----">裝甲</option><option value="SF----">砲兵</option></select>
        <select id="mil-size-select" class="select-input"><option value="00">層級</option><option value="11">組</option><option value="22">班</option><option value="33">排</option></select>
        <button class="btn" id="btn-mil-friend" onclick="setMode('mil-friend')">🟦 友軍</button>
        <button class="btn" id="btn-mil-hostile" onclick="setMode('mil-hostile')">🟥 敵軍</button>
        <button class="btn btn-clear" onclick="broadcastClear()">🗑️ 清除所有</button>
    </div>

    <div class="bottom-center-panel">
        <div id="gps-status">座標: 等待定位...</div>
    </div>

    <div class="bottom-right-panel">
        <button class="btn" onclick="toggleMapStyle()">🗺️ 風格</button>
        <button class="btn" onclick="getLocation()">📡 GPS</button>
    </div>

    <div class="status-panel">
        <div><strong>WEB-TAK COP</strong></div>
        <div>房間: <span id="current-room">未連線</span></div>
        <div id="user-list">🟢 線上隊員 (<span id="user-count">1</span>)</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // (保持你原有的 JavaScript 邏輯，確保函數如 setMode, broadcastClear, getLocation 運作正常)
        let myCallsign = "ALPHA-01";
        let myRoomID = "PUBLIC_01";
        let localUserList = [];
        const socket = (typeof io !== 'undefined') ? io() : { emit: () => {}, on: () => {} };
        const map = L.map('map', { zoomControl: false }).setView([24.9443, 121.2154], 14); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        function joinTacticalNetwork() {
            myCallsign = document.getElementById('user-callsign').value;
            document.getElementById('login-overlay').style.display = 'none';
            socket.emit('join_room', { room: myRoomID, username: myCallsign });
        }
        // 其餘原有 JavaScript 邏輯...
    </script>
</body>
</html>
