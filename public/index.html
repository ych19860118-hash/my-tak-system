<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 引入繪圖工具與軍事符號庫 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/milsymbol/2.0.0/milsymbol.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-TAK 數位地圖協作</title>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }
        #status { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="status">Web-TAK 伺服器連線中...</div>
    <div id="map"></div>

    <!-- 引入 Leaflet 與 Socket.io 前端 JS -->
    <script src="https://unpkg.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 1. 初始化地圖 (預設定位在台灣中心附近)
        const map = L.map('map').setView([23.6978, 120.9605], 8);

        // 2. 載入 OpenStreetMap 地圖層
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. 連線到後端 Socket.io
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('status').innerText = '伺服器連線成功！';
            document.getElementById('status').style.color = 'green';
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = '與伺服器斷開連線...';
            document.getElementById('status').style.color = 'red';
        });
       // 建立繪圖圖層
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// 加入繪圖選單
const drawControl = new L.Control.Draw({
    edit: { featureGroup: drawnItems },
    draw: {
        polygon: true,
        polyline: true,
        circle: true,
        rectangle: true,
        marker: false
    }
});
map.addControl(drawControl);

// 繪圖結束時存入地圖
map.on(L.Draw.Event.CREATED, (e) => {
    drawnItems.addLayer(e.layer);
}); 
    </script>
</body>
</html>
