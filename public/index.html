<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Web-TAK 數位地圖協作</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    const map = L.map('map').setView([25.0330, 121.5654], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const drawnItems = new L.FeatureGroup().addTo(map);
    const socket = io();
    
    // 1. 登入機制
    const username = prompt("請輸入您的名稱:");
    const room = prompt("請輸入房間號碼 (例如: room1):");

    socket.on('connect', () => {
      socket.emit('join', { username, room });
    });

    // 2. 繪圖工具列
    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: { marker: true, polyline: true, polygon: true, circle: true, rectangle: true }
    });
    map.addControl(drawControl);

    // 3. 繪製完成處理
    map.on(L.Draw.Event.CREATED, function (e) {
      const layer = e.layer;
      const name = prompt("請命名此物件:", "新物件");
      const color = prompt("請輸入顏色 (例如: #FF0000):", "#3388ff");
      
      layer.setStyle({ color: color });
      layer.bindPopup("名稱: " + name);
      drawnItems.addLayer(layer);

      const shapeData = {
        id: Date.now().toString(),
        type: e.layerType,
        data: layer.toGeoJSON().geometry,
        radius: layer.getRadius ? layer.getRadius() : null,
        properties: { name, color }
      };
      socket.emit('shape:add', shapeData);
    });

    // 4. 編輯後同步處理
    map.on('draw:edited', function (e) {
      e.layers.eachLayer(function (layer) {
        socket.emit('shape:update', {
          id: layer.options.id, // 這需要與 server 對應
          data: layer.toGeoJSON().geometry,
          radius: layer.getRadius ? layer.getRadius() : null
        });
      });
    });

    // 5. 接收伺服器同步的圖形
    socket.on('init-shapes', (shapes) => {
      shapes.forEach(renderShape);
    });

    socket.on('shape:added', renderShape);

    function renderShape(shape) {
      let layer;
      if (shape.type === 'circle') {
        layer = L.circle(shape.data.coordinates.reverse(), { radius: shape.radius });
      } else if (shape.type === 'rectangle' || shape.type === 'polygon') {
        layer = L.polygon(shape.data.coordinates[0].map(c => c.reverse()));
      } else if (shape.type === 'marker') {
        layer = L.marker(shape.data.coordinates.reverse());
      }
      
      if (layer) {
        layer.options.id = shape.id;
        layer.setStyle({ color: shape.properties.color });
        layer.bindPopup("名稱: " + shape.properties.name);
        layer.addTo(drawnItems);
      }
    }
  </script>
</body>
</html>
