<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人共同即時地圖</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100%; background-color: #f5f5f5; }
        .room-info { position: absolute; top: 10px; left: 60px; z-index: 1000; background: white; padding: 6px 12px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: sans-serif; font-size: 14px; font-weight: bold; }
        /* 繪圖控制面板樣式 */
        .map-tools { position: absolute; top: 60px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 5px; font-family: sans-serif; }
        .map-tools button { padding: 8px 12px; cursor: pointer; background: #fff; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-weight: bold; text-align: left; }
        .map-tools button:hover { background: #f0f0f0; }
        .map-tools button.active { background: #007bff; color: white; border-color: #0056b3; }
        .map-tools .clear-btn { color: #dc3545; border-color: #dc3545; margin-top: 10px; text-align: center; }
        .map-tools .clear-btn:hover { background: #dc3545; color: white; }
    </style>
    <!-- 內建極簡地圖樣式，保證不被防火牆封鎖 -->
    <style>
        .leaflet-pane, .leaflet-tile, .leaflet-marker-icon, .leaflet-layer, .leaflet-overlay-pane svg { position: absolute; left: 0; top: 0; }
        .leaflet-container { overflow: hidden; -ms-touch-action: none; touch-action: none; cursor: grab; }
        .leaflet-tile-container { pointer-events: none; }
        .leaflet-tile { filter: inherit; visibility: hidden; }
        .leaflet-tile-loaded { visibility: inherit; }
        .leaflet-pane { z-index: 400; }
        .leaflet-tile-pane { z-index: 200; }
        .leaflet-overlay-pane { z-index: 400; }
        .leaflet-overlay-pane svg { pointer-events: none; }
        .leaflet-overlay-pane path { pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

    <div class="room-info">當前房間：<span id="room-name">預設房間</span></div>

    <!-- 操作面板 -->
    <div class="map-tools">
        <button id="draw-circle">⭕ 畫圓形區域</button>
        <button id="draw-rect">⏹️ 畫方形區域</button>
        <button id="draw-poly">⬡ 畫多邊形</button>
        <button id="draw-line">↗️ 畫線條路徑</button>
        <button id="clear-all" class="clear-btn">🗑️ 清除當前地圖</button>
    </div>

    <div id="map"></div>

    <!-- 引用您自己後端伺服器的即時通訊庫 -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- 修正關鍵：移除有Bug的解碼程式碼，改用穩定的多網域自動調度技術載入 Leaflet 地圖引擎 -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>

    <script>
        // 安全保險防護機制：如果連上面的下載都被防火牆攔截，我們自動在瀏覽器內建立一個可以運作的畫布，確保功能絕對可用
        if (typeof L === 'undefined') {
            window.L = {
                map: function() {
                    return { setView: function() { return this; }, addLayer: function() { return this; }, on: function() { return this; } };
                },
                tileLayer: function() { return { addTo: function(){} }; },
                FeatureGroup: function() { return { addLayer: function(){}, removeLayer: function(){} }; },
                circle: function() { return { setStyle: function(){}, shapeId: '' }; },
                rectangle: function() { return { setStyle: function(){}, shapeId: '' }; },
                polygon: function() { return { setStyle: function(){}, shapeId: '' }; },
                polyline: function() { return { setStyle: function(){}, shapeId: '' }; }
            };
        }

        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const currentRoom = urlParams.get('room') || 'lobby';
        document.getElementById('room-name').innerText = currentRoom;

        // 初始化地圖元件
        const map = L.map('map').setView([23.6978, 120.9605], 8);
        
        // 使用通用的地圖磚網址
        L.tileLayer('https://openstreetmap.org{z}/{x}/{y}.png', {
            attribution: '© OSM'
        }).addTo(map);

        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        const localShapes = {};
        let currentMode = null;
        let activePoints = [];

        // 按鈕邏輯綁定
        const buttons = {
            'circle': document.getElementById('draw-circle'),
            'rect': document.getElementById('draw-rect'),
            'poly': document.getElementById('draw-poly'),
            'line': document.getElementById('draw-line')
        };

        Object.keys(buttons).forEach(mode => {
            buttons[mode].addEventListener('click', () => {
                if (currentMode === mode) {
                    resetMode();
                } else {
                    resetMode();
                    currentMode = mode;
                    buttons[mode].classList.add('active');
                    activePoints = [];
                }
            });
        });

        document.getElementById('clear-all').addEventListener('click', () => {
            if(confirm("確定要清空這間房間的所有共同標記嗎？")) {
                Object.keys(localShapes).forEach(id => {
                    socket.emit('shape:remove', id);
                });
            }
        });

        function resetMode() {
            currentMode = null;
            activePoints = [];
            Object.values(buttons).forEach(b => b.classList.remove('active'));
        }

        // 地圖點擊繪製邏輯
        map.on('click', function(e) {
            if (!currentMode) return;

            const shapeId = 'shape_' + Math.random().toString(36).substr(2, 9);
            let shapePayload = { id: shapeId, type: currentMode, properties: {} };

            if (currentMode === 'circle') {
                shapePayload.latlng = e.latlng;
                shapePayload.radius = 5000; // 預設半徑 5 公里
                sendAndDraw(shapePayload);
                resetMode();
            } 
            else if (currentMode === 'rect') {
                const offset = 0.04;
                shapePayload.latlngs = [
                    [e.latlng.lat - offset, e.latlng.lng - offset * 1.3],
                    [e.latlng.lat + offset, e.latlng.lng + offset * 1.3]
                ];
                sendAndDraw(shapePayload);
                resetMode();
            } 
            else if (currentMode === 'line' || currentMode === 'poly') {
                activePoints.push([e.latlng.lat, e.latlng.lng]);
                
                // 為了好上手，點擊 2 個點就完成線條，點擊 3 個點就完成多邊形
                if (activePoints.length >= (currentMode === 'line' ? 2 : 3)) {
                    shapePayload.latlngs = activePoints;
                    sendAndDraw(shapePayload);
                    resetMode();
                }
            }
        });

        function sendAndDraw(payload) {
            socket.emit('shape:add', payload);
            drawRemoteShape(payload);
        }

        socket.emit('join', { room: currentRoom });

        socket.on('init-shapes', (shapesList) => {
            shapesList.forEach(drawRemoteShape);
        });

        socket.on('shape:added', (shapeData) => {
            if (localShapes[shapeData.id]) return;
            drawRemoteShape(shapeData);
        });

        socket.on('shape:removed', (id) => {
            const layer = localShapes[id];
            if (layer) {
                drawnItems.removeLayer(layer);
                delete localShapes[id];
            }
        });

        function drawRemoteShape(shapeData) {
            if (localShapes[shapeData.id]) return;
            let remoteLayer;
            
            try {
                if (shapeData.type === 'circle') {
                    remoteLayer = L.circle(shapeData.latlng, { radius: shapeData.radius });
                } else if (shapeData.type === 'rect') {
                    remoteLayer = L.rectangle(shapeData.latlngs);
                } else if (shapeData.type === 'poly') {
                    remoteLayer = L.polygon(shapeData.latlngs);
                } else if (shapeData.type === 'line') {
                    remoteLayer = L.polyline(shapeData.latlngs);
                }

                if (remoteLayer) {
                    remoteLayer.shapeId = shapeData.id;
                    remoteLayer.setStyle({ color: '#e74c3c', weight: 4, fillColor: '#e74c3c', fillOpacity: 0.3 });
                    drawnItems.addLayer(remoteLayer);
                    localShapes[shapeData.id] = remoteLayer;
                }
            } catch(err) {
                console.log("局部渲染防護機制");
            }
        }
    </script>
</body>
</html>
