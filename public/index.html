<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人共同即時地圖</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f8f9fa; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        
        /* 地圖影像底圖層：預設顯示點格，並嘗試加載真實地圖磚 */
        #map-tiles { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: radial-gradient(#d3d3d3 1.5px, transparent 1.5px); 
            background-size: 30px 30px;
            display: grid;
            pointer-events: none; /* 讓點擊可以穿透到畫布 */
            opacity: 0.85;
        }
        .tile {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            border: 1px dashed rgba(0,0,0,0.03); /* 輕微格線 */
        }

        /* 核心幾何繪圖畫布 */
        #map-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
        
        .room-info { position: absolute; top: 10px; left: 60px; z-index: 1000; background: white; padding: 6px 12px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-family: sans-serif; font-size: 14px; font-weight: bold; }
        
        /* 繪圖控制面板樣式 */
        .map-tools { position: absolute; top: 60px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 6px; font-family: sans-serif; }
        .map-tools button { padding: 10px 14px; cursor: pointer; background: #fff; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-weight: bold; text-align: left; transition: all 0.2s; }
        .map-tools button:hover { background: #f0f0f0; }
        .map-tools button.active { background: #007bff; color: white; border-color: #0056b3; }
        .map-tools .clear-btn { color: #dc3545; border-color: #dc3545; margin-top: 10px; text-align: center; }
        .map-tools .clear-btn:hover { background: #dc3545; color: white; }
    </style>
</head>
<body>

    <div class="room-info">當前房間：<span id="room-name">預設房間</span></div>

    <div id="canvas-container">
        <!-- 自動調度地圖磚影像底圖（高相容防封鎖技術） -->
        <div id="map-tiles"></div>

        <!-- 核心繪圖畫布 -->
        <canvas id="map-canvas"></canvas>

        <!-- 操作面板 -->
        <div class="map-tools">
            <button id="draw-circle">⭕ 畫圓形區域</button>
            <button id="draw-rect">⏹️ 畫方形區域</button>
            <button id="draw-poly">⬡ 畫多邊形</button>
            <button id="draw-line">↗️ 畫線條路徑</button>
            <button id="clear-all" class="clear-btn">🗑️ 清除當前地圖</button>
        </div>
    </div>

    <!-- 引用您自己後端伺服器的即時通訊庫 -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const currentRoom = urlParams.get('room') || 'lobby';
        document.getElementById('room-name').innerText = currentRoom;

        // 初始化 HTML5 Canvas
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');

        // 動態生成高相容地圖底圖影像
        function generateMapTiles() {
            const tileContainer = document.getElementById('map-tiles');
            tileContainer.innerHTML = '';
            
            // 計算畫布需要的地圖網格數量
            const columns = Math.ceil(window.innerWidth / 256) + 1;
            const rows = Math.ceil(window.innerHeight / 256) + 1;
            tileContainer.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;

            // 使用開放式核心地圖影像網格
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < columns; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    
                    // 計算相對應的固定範圍網格，確保即使載入被檔案牆阻擋也不會崩潰
                    const x = 13739 + c;
                    const y = 6271 + r;
                    tile.style.backgroundImage = `url('https://openstreetmap.org{x}/${y}.png')`;
                    
                    // 安全補償：如果此圖片加載失敗（被防火牆阻擋），網頁會保持優雅的灰色點格，絕不噴紅字
                    tile.onerror = function() {
                        this.style.backgroundImage = 'none';
                    };
                    
                    tileContainer.appendChild(tile);
                }
            }
        }

        // 自動調整畫布大小符合視窗
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateMapTiles();
            redrawAll();
        }
        window.addEventListener('resize', resizeCanvas);

        // 儲存所有圖形的物件與目前的繪圖狀態
        let shapes = {};
        let currentMode = null;
        let clickedPoints = [];

        const buttons = {
            'circle': document.getElementById('draw-circle'),
            'rect': document.getElementById('draw-rect'),
            'poly': document.getElementById('draw-poly'),
            'line': document.getElementById('draw-line')
        };

        // 切換繪圖模式的按鈕邏輯
        Object.keys(buttons).forEach(mode => {
            buttons[mode].addEventListener('click', () => {
                if (currentMode === mode) {
                    resetMode();
                } else {
                    resetMode();
                    currentMode = mode;
                    buttons[mode].classList.add('active');
                }
            });
        });

        document.getElementById('clear-all').addEventListener('click', () => {
            if(confirm("確定要清空這間房間的所有共同標記嗎？")) {
                Object.keys(shapes).forEach(id => {
                    socket.emit('shape:remove', id);
                });
            }
        });

        function resetMode() {
            currentMode = null;
            clickedPoints = [];
            Object.values(buttons).forEach(b => b.classList.remove('active'));
        }

        // 當點擊畫布時，觸發圖形座標計算
        canvas.addEventListener('click', (e) => {
            if (!currentMode) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const shapeId = 'shape_' + Math.random().toString(36).substr(2, 9);
            let newShape = { id: shapeId, type: currentMode };

            if (currentMode === 'circle') {
                newShape.x = x;
                newShape.y = y;
                newShape.radius = 65; // 圓形大小
                sendAndDraw(newShape);
                resetMode();
            } 
            else if (currentMode === 'rect') {
                newShape.x = x - 50; // 點擊處為中心延伸方形
                newShape.y = y - 50;
                newShape.width = 100;
                newShape.height = 100;
                sendAndDraw(newShape);
                resetMode();
            } 
            else if (currentMode === 'line' || currentMode === 'poly') {
                clickedPoints.push({ x: x, y: y });
                
                const requiredPoints = (currentMode === 'line') ? 2 : 3;
                if (clickedPoints.length >= requiredPoints) {
                    newShape.points = clickedPoints;
                    sendAndDraw(newShape);
                    resetMode();
                } else {
                    // 在畫布上點選暫存點時，給予輕微視覺提示
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        });

        function sendAndDraw(shape) {
            socket.emit('shape:add', shape);
            shapes[shape.id] = shape;
            redrawAll();
        }

        // 重新繪製整個畫布的所有即時圖形
        function redrawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            Object.values(shapes).forEach(shape => {
                ctx.beginPath();
                ctx.strokeStyle = '#e74c3c'; // 鮮明亮紅色外框
                ctx.lineWidth = 4;
                ctx.fillStyle = 'rgba(231, 76, 60, 0.35)'; // 半透明紅色填滿

                if (shape.type === 'circle') {
                    ctx.arc(shape.x, shape.y, shape.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } 
                else if (shape.type === 'rect') {
                    ctx.fillRect(shape.x, shape.y, shape.width, shape.height);
                    ctx.strokeRect(shape.x, shape.y, shape.width, shape.height);
                } 
                else if (shape.type === 'line' && shape.points) {
                    ctx.moveTo(shape.points[0].x, shape.points[0].y);
                    ctx.lineTo(shape.points[1].x, shape.points[1].y);
                    ctx.stroke();
                } 
                else if (shape.type === 'poly' && shape.points) {
                    ctx.moveTo(shape.points[0].x, shape.points[0].y);
                    for (let i = 1; i < shape.points.length; i++) {
                        ctx.lineTo(shape.points[i].x, shape.points[i].y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
            });
        }

        // 伺服器房間連線監聽
        socket.emit('join', { room: currentRoom });

        socket.on('init-shapes', (shapesList) => {
            shapes = {};
            shapesList.forEach(shape => {
                shapes[shape.id] = shape;
            });
            redrawAll();
        });

        socket.on('shape:added', (shape) => {
            shapes[shape.id] = shape;
            redrawAll();
        });

        socket.on('shape:removed', (id) => {
            delete shapes[id];
            redrawAll();
        });
