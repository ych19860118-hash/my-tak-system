<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-TAK 共同作戰圖像平台 (終極標準兵棋版)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <!-- 2. 引入 JavaScript 函式庫 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; background-color: #000; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 登入與房間選擇覆蓋層 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 10, 15, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; color: #00ffcc; }
        .login-box { background: rgba(15, 25, 35, 0.9); border: 2px solid #00ffcc; box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); padding: 30px; border-radius: 8px; width: 320px; text-align: center; }
        .login-box h2 { margin-bottom: 20px; letter-spacing: 2px; font-size: 20px; }
        .login-input { width: 100%; height: 35px; background: #141e28; border: 1px solid #00ffcc; color: #fff; padding: 5px 10px; border-radius: 4px; margin-bottom: 15px; font-family: inherit; }
        .login-btn { width: 100%; height: 40px; background: #00ffcc; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 14px; transition: all 0.2s; }
        .login-btn:hover { background: #00ccaa; box-shadow: 0 0 10px rgba(0, 255, 204, 0.8); }

       /* --- 面板位置調整 --- */
.status-panel {
    position: absolute;
    top: 20px;
    right: 20px; /* 改至右側 */
    z-index: 10;
    background: rgba(0, 20, 20, 0.9);
    border: 1px solid #00ffcc;
    box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
    padding: 15px;
    border-radius: 6px;
    color: #00ffcc;
    font-size: 13px;
    width: 250px;
}

/* --- 修正後的收合功能樣式 --- */
.panel-collapsed {
    height: 35px !important; 
    overflow: hidden;
    padding: 5px !important;
}

/* 修改這裡：確保收合時，除「收合按鈕(button)」外，其餘內容全部隱藏 */
.panel-collapsed > *:not(button) {
    display: none !important;
}

/* --- 修正：左側控制面板 (Action Panel) 樣式統一 --- */
.action-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 90vh;
    overflow-y: auto;
    width: 200px;
    background: rgba(0, 20, 20, 0.9);
    border: 1px solid #00ffcc;
    padding: 10px;
    border-radius: 6px;
}

/* 統一調整左側所有按鈕樣式 */
.btn, .btn-toggle-map, .btn-gps {
    width: 100%;
    height: 32px; 
    background: rgba(40, 60, 80, 0.7); 
    border: 1px solid #00ffcc;
    color: #fff;
    cursor: pointer;
    font-size: 11px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn:hover { background: rgba(0, 255, 204, 0.2); }
.btn.active { background: #00ffcc !important; color: #000; font-weight: bold; }

.btn-clear {
    background: rgba(100, 20, 20, 0.8);
    border: 1px solid #e74c3c;
    color: #ffcccc;
}

/* --- 優化：兵棋選單與標籤樣式 --- */
.panel-section {
    padding: 10px 0;
    border-bottom: 1px solid #114444;
}

.panel-title {
    font-size: 12px;
    color: #00ffcc;
    margin-bottom: 10px;
    font-weight: bold;
    text-transform: uppercase;
}

.select-label {
    display: block;
    font-size: 10px;
    color: #88aaaa; /* 使用淺灰藍，讓標籤更清晰 */
    margin: 8px 0 4px 0;
}

/* 統一調整所有下拉選單的樣式 */
.select-input {
    width: 100%;
    height: 30px;
    background: #0a1620; /* 深底色 */
    border: 1px solid #00ffcc;
    color: #ffffff;
    padding: 0 5px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
}

.select-input:focus {
    outline: none;
    background: #152535;
    border-color: #00ffcc;
}

/* 確保格狀佈局對齊 */
.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 5px;
}
    /* 隱藏/顯示的開合動畫 */
.panel-section-content {
    transition: max-height 0.3s ease-out, opacity 0.3s;
    overflow: hidden;
    max-height: 500px; /* 展開時的高度 */
    opacity: 1;
}

.panel-section-content.collapsed {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
}

/* 標題變成可點擊的按鈕樣式 */
.panel-title {
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.panel-title::after {
    content: '▼';
    font-size: 10px;
}

.panel-title.collapsed::after {
    content: '▶';
}
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>WEB-TAK 戰術登入</h2>
            <label class="select-label" style="text-align:left;">👤 輸入作戰呼號 (Callsign)</label>
            <input type="text" id="user-callsign" class="login-input" value="ALPHA-01">
            
            <label class="select-label" style="text-align:left;">⛺ 選擇/建立戰術房間</label>
            <select id="room-type-select" class="select-input" onchange="toggleCustomRoomInput()">
                <option value="PUBLIC_01">公開作戰房 01 (Public)</option>
                <option value="PUBLIC_02">公開作戰房 02 (Public)</option>
                <option value="CUSTOM">🔒 自訂私人作戰房 (Private)</option>
            </select>
            <input type="text" id="custom-room-id" class="login-input" placeholder="請輸入自訂房間代碼" style="display:none;">
            
            <button class="login-btn" onclick="joinTacticalNetwork()">連線進入 COP 系統</button>
        </div>
    </div>

    <div id="map"></div>
    
    <!-- 左側狀態面板 (修正結構) -->
<!-- 左側狀態面板 (修正結構) -->
<div class="status-panel">
    <button onclick="togglePanel(this)" style="position:absolute; top:5px; right:5px; cursor:pointer;">✖</button>
    
    <!-- 隱藏的資料容器 -->
    <div id="current-mode" style="display:none;"></div>
    <div id="current-room" style="display:none;"></div>
    <div id="weather-box" style="display:none;"></div>

    <!-- 顯示內容區塊 -->
    <div class="user-list-box">
        <div style="font-weight:bold; margin-bottom:3px; color:#00ffcc;">
            🟢 線上隊員 (<span id="user-count">1</span>)
        </div>
        <div id="user-list"></div>
    </div>
    
    <div id="gps-status" style="font-size:10px; margin-top:5px; color:#aaa;"></div>
</div>

    <!-- 右側控制面板 (修正結構) -->
   <div class="action-panel">
    <button onclick="togglePanel(this)" style="position:absolute; top:5px; right:5px; cursor:pointer;">✖</button>
    <button class="btn-toggle-map" onclick="toggleMapStyle()">🗺️ 切換地圖風格</button>        

    <!-- 區塊 1 -->
    <div class="panel-section">
        <div class="panel-title" onclick="toggleSection(this, 'section1')">1. 兵棋自選選單</div>
        <div id="section1" class="panel-section-content">
            <label class="select-label">🔹 選擇兵科</label>
    <select id="mil-branch-select" class="select-input">
        <option value="ST----">步兵 (Infantry)</option>
        <option value="UC----">裝甲 (Armor)</option>
        <option value="SF----">砲兵 (Artillery)</option>
        <option value="AV----">陸航 (Aviation)</option>
        <option value="E-----">工兵 (Engineer)</option>
        <option value="MD----">醫療 (Medical)</option>
        <option value="SU----">飛彈 (Missile)</option>
        <option value="C4----">通信 (Signal)</option>
    </select>

    <label class="select-label">🔹 選擇階級</label>
    <select id="mil-size-select" class="select-input">
        <option value="00">無指定</option>
        <option value="11">組 (Team)</option>
                <option value="22">班 (Squad)</option>
                <option value="33">排 (Platoon)</option>
                <option value="44">連 (Company)</option>
                <option value="55">營 (Battalion)</option>
                <option value="66">旅 (Brigade)</option>
            </select>

            <label class="select-label">▼ 選擇陣營放置</label>
            <div class="grid-2">
                <button class="btn" id="btn-mil-friend" onclick="setMode('mil-friend')">友軍</button>
                <button class="btn" id="btn-mil-hostile" onclick="setMode('mil-hostile')">敵軍</button>
                <button class="btn" id="btn-mil-neutral" onclick="setMode('mil-neutral')">中立</button>
                <button class="btn" id="btn-mil-unknown" onclick="setMode('mil-unknown')">不明</button>
            </div>
        </div>
        
<!-- 區塊 2 -->
    <div class="panel-section">
        <div class="panel-title" onclick="toggleSection(this, 'section2')">2. 範圍工具</div>
        <div id="section2" class="panel-section-content">
            <div class="grid-2">
                <button class="btn" id="btn-circle" onclick="setMode('circle')">⭕ 圓形</button>
                <button class="btn" id="btn-rect" onclick="setMode('rect')">⬜ 方形</button>
                <button class="btn" id="btn-poly" onclick="setMode('poly')">⬡ 多邊形</button>
                <button class="btn" id="btn-line" onclick="setMode('line')">📈 線條</button>
            </div>
        </div>
    </div>
    
    <button class="btn btn-clear" onclick="broadcastClear()">🗑️ 清除圖層</button>
</div>
    
<script>
    let myCallsign = "ALPHA-01", myRoomID = "PUBLIC_01";
    const map = L.map('map', { zoomControl: false }).setView([24.9443, 121.2154], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 儲存所有圖層的群組
    const drawnItems = new L.FeatureGroup().addTo(map);

    // 建立所有繪圖工具
    const drawTools = {
        circle: new L.Draw.Circle(map),
        rect: new L.Draw.Rectangle(map),
        poly: new L.Draw.Polygon(map),
        line: new L.Draw.Polyline(map)
    };

    // 處理按鈕點擊：只開啟對應的工具
    window.setMode = function(mode) {
        // 先確保關閉所有其他工具
        Object.values(drawTools).forEach(t => t.disable());
        if (drawTools[mode]) drawTools[mode].enable();
    };

    // 核心：繪製完成後的邏輯
    map.on(L.Draw.Event.CREATED, function (e) {
        const layer = e.layer;
        drawnItems.addLayer(layer);
        
        // 綁定編輯視窗
        layer.bindPopup(`
            <div class="props-form">
                <label>名稱</label><input type="text" id="edit-name" value="新物件">
                <label>顏色</label><input type="color" id="edit-color" value="#ff0000">
                <button class="btn" onclick="saveEdit(this)">儲存修改</button>
            </div>
        `);
        
        // 畫完後自動觸發進入編輯狀態 (關鍵！)
        // 讓物件節點可以被拉動、調整大小
        layer.editing.enable(); 
    });

    // 畫完一個後，強制停止工具，避免重複繪製
    map.on('draw:created', function () {
        Object.values(drawTools).forEach(t => t.disable());
    });

    // 儲存並更新樣式
    window.saveEdit = function(btn) {
        const container = btn.parentElement;
        const name = container.querySelector('#edit-name').value;
        const color = container.querySelector('#edit-color').value;
        
        map.eachLayer(layer => {
            if (layer.getPopup() && layer.getPopup().isOpen()) {
                layer.setStyle({ color: color, fillColor: color });
                layer.bindTooltip(name, {permanent: true}).openTooltip();
                layer.closePopup();
            }
        });
    };

    // --- 其他 UI 功能 ---
    window.togglePanel = (btn) => btn.parentElement.classList.toggle('panel-collapsed');
    window.toggleSection = (el, id) => {
        document.getElementById(id).classList.toggle('collapsed');
        el.classList.toggle('collapsed');
    };
    window.broadcastClear = () => { if(confirm("確定刪除所有圖層？")) drawnItems.clearLayers(); };
    window.joinTacticalNetwork = () => document.getElementById('login-overlay').style.display = 'none';
    window.toggleMapStyle = () => alert("地圖切換功能需後端對接");
</script>
</body>
</html>
