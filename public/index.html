<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WEB-TAK 共同作戰圖像平台</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
    button, .btn, .lbtn, .map-btn {
    touch-action: manipulation; /* 告訴瀏覽器這個元素是用來按的，不需要延遲判斷 */
}
*{box-sizing:border-box;margin:0;padding:0;}
body,html{width:100%;height:100%;overflow:hidden;font-family:'Courier New',monospace;background:#000;}
#map{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1;}
/* 2. 登入遮罩 (這裡就是你問的這一區) */
    #login-overlay {
        position: fixed;
        inset: 0;
        background: rgba(4,10,16,.97);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
    }
/* ── LOGIN ── */
#login-overlay{position:fixed;inset:0;background:rgba(4,10,16,.97);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{background:rgba(10,22,34,.95);border:2px solid #00ffcc;box-shadow:0 0 30px rgba(0,255,204,.45),inset 0 0 20px rgba(0,255,204,.04);padding:32px 28px;border-radius:6px;width:340px;text-align:center;color:#00ffcc;}
.login-box h2{letter-spacing:3px;font-size:18px;margin-bottom:6px;}
.login-box p{font-size:10px;color:#336655;letter-spacing:1px;margin-bottom:24px;}
.lbl{display:block;font-size:10px;color:#557766;text-align:left;margin:10px 0 4px;}
.linput{width:100%;height:36px;background:#071218;border:1px solid #00ffcc44;color:#fff;padding:0 10px;border-radius:4px;font-family:inherit;font-size:13px;transition:border .2s;}
.linput:focus{outline:none;border-color:#00ffcc;}
.lbtn{width:100%;height:40px;background:linear-gradient(135deg,#00ccaa,#009977);border:none;color:#000;font-weight:bold;cursor:pointer;border-radius:4px;font-size:14px;letter-spacing:2px;margin-top:20px;transition:all .2s;}
.lbtn:hover{background:linear-gradient(135deg,#00ffcc,#00bbaa);box-shadow:0 0 14px rgba(0,255,204,.7);}

/* ── PANELS ── */
.panel{position:absolute;z-index:10;background:rgba(3,14,20,.92);border:1px solid #00ffcc33;backdrop-filter:blur(4px);}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #00ffcc22;cursor:move;user-select:none;}
.panel-hdr span{font-size:11px;color:#00ffcc;letter-spacing:2px;font-weight:bold;}
.panel-body{padding:10px;}

/* Status panel */
#status-panel{top:18px;right:18px;width:220px;border-radius:6px;}
.user-entry{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;color:#aaa;border-bottom:1px solid #00ffcc0f;}
.user-entry.me{color:#00ffcc;}
.dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.dot.online{background:#00ffcc;box-shadow:0 0 6px #00ffcc;}

/* Action panel */
#action-panel{top:18px;left:18px;width:210px;border-radius:6px;}
.section-hdr{font-size:10px;color:#557766;letter-spacing:1px;padding:8px 0 5px;border-top:1px solid #00ffcc11;margin-top:4px;cursor:pointer;display:flex;justify-content:space-between;}
.section-hdr:first-child{border-top:none;padding-top:2px;}
.section-body{overflow:hidden;transition:max-height .25s ease,opacity .25s;max-height:400px;opacity:1;}
.section-body.closed{max-height:0;opacity:0;pointer-events:none;}
.sel{width:100%;height:30px;background:#071218;border:1px solid #00ffcc33;color:#ccc;padding:0 6px;border-radius:3px;font-size:11px;margin-bottom:6px;cursor:pointer;}
.sel:focus{outline:none;border-color:#00ffcc88;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px;}
.btn{height:30px;background:rgba(0,255,204,.07);border:1px solid #00ffcc33;color:#aaccaa;font-size:10px;border-radius:3px;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.btn:hover{background:rgba(0,255,204,.18);color:#00ffcc;border-color:#00ffcc88;}
.btn.active{background:rgba(0,255,204,.25);color:#00ffcc;border-color:#00ffcc;box-shadow:0 0 8px rgba(0,255,204,.3);}
.btn-full{grid-column:1/-1;}
.btn-danger{background:rgba(180,20,20,.2);border-color:#e74c3c44;color:#ff8888;}
.btn-danger:hover{background:rgba(200,30,30,.35);border-color:#e74c3c;color:#ffaaaa;}

/* Map toggle */
#map-toggle-bar{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;}
.map-btn{height:28px;padding:0 14px;background:rgba(3,14,20,.9);border:1px solid #00ffcc33;color:#557766;font-size:10px;letter-spacing:1px;border-radius:14px;cursor:pointer;transition:all .2s;}
.map-btn.active{border-color:#00ffcc;color:#00ffcc;box-shadow:0 0 10px rgba(0,255,204,.3);}

/* Notifications */
#notif{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;}
.notif-item{background:rgba(0,255,204,.12);border:1px solid #00ffcc44;color:#00ffcc;font-size:11px;padding:6px 16px;border-radius:20px;margin-top:6px;animation:fadeUp .3s ease,fadeOut .4s ease 2.6s forwards;white-space:nowrap;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-6px)}}

/* Mil icon wrapper */
.mil-icon-wrapper{pointer-events:none;}
.mil-icon-wrapper svg{overflow:visible;}

/* Popup */
.lf-popup{font-family:'Courier New',monospace;font-size:12px;min-width:180px;}
.lf-popup .pop-owner{color:#557766;font-size:10px;margin-bottom:8px;letter-spacing:1px;}
.lf-popup label{display:block;font-size:10px;color:#556;margin:6px 0 2px;}
.lf-popup input[type=text]{width:100%;height:26px;background:#f8fff8;border:1px solid #aaa;padding:0 6px;border-radius:3px;font-size:11px;}
.lf-popup input[type=color]{width:100%;height:26px;padding:1px;border:1px solid #aaa;border-radius:3px;cursor:pointer;}
.lf-popup .pop-btn{width:100%;height:28px;margin-top:8px;background:#c0392b;border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:11px;letter-spacing:1px;}
.lf-popup .pop-btn:hover{background:#e74c3c;}
.lf-popup .no-perm{text-align:center;color:#c0392b;font-size:10px;margin-top:8px;padding:4px;border:1px dashed #c0392b33;border-radius:3px;}

/* Drag cursor */
.dragging-shape{cursor:grabbing!important;}

.name-tooltip{background:rgba(0,0,0,.7)!important;border:1px solid #00ffcc66!important;color:#00ffcc!important;font-size:11px!important;padding:2px 6px!important;border-radius:2px!important;box-shadow:none!important;}
.name-tooltip::before{display:none!important;}
/* --- 手機優化 --- */
@media (max-width: 600px) {
    /* 讓登入框與面板在小螢幕佔滿寬度 */
    .login-box { width: 95% !important; margin: 0 auto; }
    
    #action-panel { 
        width: 95% !important; 
        left: 50% !important; 
        transform: translateX(-50%); 
        top: 10px !important; 
        max-height: 85vh !important; /* 強制面板最高佔螢幕 85% */
        display: flex;
        flex-direction: column;
    }

    /* 關鍵：讓面板內部內容可以滾動 */
    #action-panel .panel-body {
        overflow-y: auto !important;
        flex: 1;
        -webkit-overflow-scrolling: touch; /* 讓 iOS 滑動更順暢 */
    }
    
    /* 將 grid2 改為單欄 */
    .grid2 {
        grid-template-columns: 1fr !important;
        gap: 8px !important;
    }

    /* 放大所有按鈕與下拉選單，利於手指點擊 */
    .btn, .sel, .lbtn, .linput { 
        height: 50px !important; 
        font-size: 16px !important; 
        line-height: 50px;
    }

    /* 調整間距與標題 */
    .panel-body { padding: 10px !important; }
    .section-hdr { font-size: 14px !important; padding: 15px 0 !important; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <h2>WEB-TAK</h2>
    <p>COMMON OPERATING PICTURE SYSTEM</p>
    <label class="lbl">CALLSIGN (作戰呼號)</label>

      <option value="PUBLIC_02">公開房間 BRAVO</option>
      <option value="CUSTOM">自訂私人房間...</option>
    </select>
<!-- 【新增這行】 -->
<button id="btn-finish-draw" class="btn btn-full" style="display:none; background:#009977; margin-top:5px;" onclick="finishDraw()">完成繪圖</button>
    <input type="text" id="inp-room-custom" class="linput" placeholder="輸入房間代碼" style="display:none;margin-top:8px;">
    <button class="lbtn" onclick="joinNetwork()">CONNECT</button>
  </div>
</div>

<div id="map"></div>

<!-- STATUS PANEL -->
<div class="panel" id="status-panel">

</div>

<div class="panel" id="action-panel">

  <div class="panel-body">

    <div class="section-hdr" onclick="toggleSection('sec-mil',this)">

      <select class="sel" id="sel-branch">

        <option value="ARM">裝甲 Armor</option>
        <option value="ART">砲兵 Artillery</option>
        <option value="ENG">工兵 Engineer</option>
        <option value="SIG">通信 Signal</option>
        <option value="MED">醫療 Medical</option>
        <option value="AVN">航空 Aviation</option>
        <option value="MP">憲兵 Military Police</option>
        <option value="AD">防空 Air Defense</option>

        <button class="btn" id="btn-poly" onclick="setMode('poly')">POLYGON</button>

</div>

<!-- MAP STYLE TOGGLE -->
<div id="map-toggle-bar">
  <button class="map-btn active" id="mb-osm" onclick="switchMap('osm')">OSM</button>
  <button class="map-btn" id="mb-sat" onclick="switchMap('sat')">SATELLITE</button>

</div>

<div id="notif"></div>

<script>
    // 【新增】完成繪圖的輔助函式
window.finishDraw = function() {
    // 呼叫原本的雙擊結束邏輯
    polyDblClickHandler({ originalEvent: { stopPropagation: ()=>{} } });
    // 隱藏按鈕
    document.getElementById('btn-finish-draw').style.display = 'none';
    // 恢復地圖拖曳
    map.dragging.enable();
};
// ════════════════════════════════════════════════
//  0. MAP INIT
// ════════════════════════════════════════════════
const map = L.map('map',{zoomControl:false,attributionControl:false}).setView([24.9443,121.2154],13);

const TILE_LAYERS = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}),
  topo:L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17})
};
let activeTile = TILE_LAYERS.osm.addTo(map);

window.switchMap = function(key){
  map.removeLayer(activeTile);
  activeTile = TILE_LAYERS[key].addTo(map);
  document.querySelectorAll('.map-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mb-'+key).classList.add('active');
};

L.control.zoom({position:'bottomright'}).addTo(map);
const drawnItems = new L.FeatureGroup().addTo(map);

// ════════════════════════════════════════════════
//  1. ROC MILITARY SYMBOL ENGINE
//  Based on ROC Army APP-6 / MIL-STD-2525 adapted
// ════════════════════════════════════════════════

// Affiliation color scheme (ROC standard)
const AFF_STYLE = {
  F:{ fill:'#80b3ff', stroke:'#003399', text:'#000' }, // Friendly: blue
  H:{ fill:'#ff6666', stroke:'#990000', text:'#fff' }, // Hostile:  red
  N:{ fill:'#aaffaa', stroke:'#006600', text:'#000' }, // Neutral:  green
  U:{ fill:'#ffff88', stroke:'#888800', text:'#000' }, // Unknown:  yellow
};

// Echelon size indicators (ROC standard above symbol)
const ECHELON_MARK = {
  TEAM:   '',
  SQUAD:  '•',
  PLATOON:'•••',
  COMPANY:'|',
  BATTALION:'||',
  REGIMENT:'|||',
  DIVISION:'X',
};

// Branch inner SVG path/shape builders
function branchSVG(branch, fill, stroke){
  const s = stroke;
  const f = fill;
  switch(branch){
    case 'INF': // crossed rifles (simplified as X lines)
      return `<line x1="16" y1="16" x2="44" y2="34" stroke="${s}" stroke-width="2.5"/>
              <line x1="44" y1="16" x2="16" y2="34" stroke="${s}" stroke-width="2.5"/>`;
    case 'ARM': // oval (tank wheel symbol)
      return `<ellipse cx="30" cy="25" rx="11" ry="7" fill="none" stroke="${s}" stroke-width="2.2"/>
              <line x1="19" y1="25" x2="41" y2="25" stroke="${s}" stroke-width="2"/>`;
    case 'ART': // filled circle (artillery burst)
      return `<circle cx="30" cy="25" r="7" fill="${s}" stroke="${s}" stroke-width="1"/>`;
    case 'ENG': // castle battlements simplified
      return `<rect x="20" y="22" width="20" height="8" fill="none" stroke="${s}" stroke-width="2"/>
              <rect x="20" y="18" width="5" height="6" fill="${s}" stroke="${s}" stroke-width="1"/>
              <rect x="28" y="18" width="5" height="6" fill="${s}" stroke="${s}" stroke-width="1"/>
              <rect x="36" y="18" width="5" height="6" fill="${s}" stroke="${s}" stroke-width="1"/>`;
    case 'SIG': // lightning bolt
      return `<polyline points="35,16 27,25 33,25 25,35" fill="none" stroke="${s}" stroke-width="2.5"/>`;
    case 'MED': // cross
      return `<rect x="27" y="17" width="6" height="16" rx="1" fill="${s}" stroke="${s}" stroke-width="1"/>
              <rect x="20" y="22" width="20" height="6" rx="1" fill="${s}" stroke="${s}" stroke-width="1"/>`;
    case 'AVN': // rotor blades
      return `<ellipse cx="30" cy="25" rx="12" ry="3" fill="none" stroke="${s}" stroke-width="2" transform="rotate(0 30 25)"/>
              <ellipse cx="30" cy="25" rx="12" ry="3" fill="none" stroke="${s}" stroke-width="2" transform="rotate(60 30 25)"/>
              <circle cx="30" cy="25" r="3" fill="${s}"/>`;
    case 'MP': // encircled M
      return `<circle cx="30" cy="25" r="9" fill="none" stroke="${s}" stroke-width="2"/>
              <text x="30" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="${s}" font-family="serif">M</text>`;
    case 'AD': // upward arrow (antiair)
      return `<line x1="30" y1="33" x2="30" y2="17" stroke="${s}" stroke-width="2.5"/>
              <polyline points="23,23 30,17 37,23" fill="none" stroke="${s}" stroke-width="2.5"/>
              <line x1="22" y1="33" x2="38" y2="33" stroke="${s}" stroke-width="2"/>`;
    case 'HQ': // flag
      return `<line x1="20" y1="14" x2="20" y2="35" stroke="${s}" stroke-width="2.5"/>
              <polygon points="20,14 38,19 20,25" fill="${s}" stroke="${s}" stroke-width="1"/>`;
    default:
      return `<text x="30" y="30" text-anchor="middle" font-size="13" fill="${s}" font-family="monospace">?</text>`;
  }
}

/**
 * buildMilSVG — Generates ROC-standard military unit symbol as SVG string
 * Returns { svg: String, width: Number, height: Number }
 */
function buildMilSVG(branch, echelon, aff){
  const style = AFF_STYLE[aff] || AFF_STYLE['U'];
  const eco = ECHELON_MARK[echelon] || '';
  const W=60, H=50, boxX=5, boxY=10, boxW=50, boxH=30;

  // Affiliation shape: Friendly=rect, Hostile=diamond, Neutral=rect+border, Unknown=circle
  let affShape='';
  if(aff==='F'){
    affShape=`<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" rx="2"
               fill="${style.fill}" stroke="${style.stroke}" stroke-width="2.5"/>`;
  } else if(aff==='H'){
    const cx=W/2, cy=boxY+boxH/2, hw=boxW/2, hh=boxH/2;
    affShape=`<polygon points="${cx},${boxY} ${cx+hw},${cy} ${cx},${boxY+boxH} ${cx-hw},${cy}"
               fill="${style.fill}" stroke="${style.stroke}" stroke-width="2.5"/>`;
  } else if(aff==='N'){
    affShape=`<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" rx="2"
               fill="${style.fill}" stroke="${style.stroke}" stroke-width="2.5"/>
              <rect x="${boxX+3}" y="${boxY+3}" width="${boxW-6}" height="${boxH-6}" rx="1"
               fill="none" stroke="${style.stroke}" stroke-width="1.2"/>`;
  } else { // Unknown
    affShape=`<ellipse cx="${W/2}" cy="${boxY+boxH/2}" rx="${boxW/2}" ry="${boxH/2}"
               fill="${style.fill}" stroke="${style.stroke}" stroke-width="2.5"/>`;
  }

  // Echelon mark (above box)
  let ecoMark = eco ? `<text x="${W/2}" y="9" text-anchor="middle" font-size="9"
    fill="${style.stroke}" font-family="serif" font-weight="bold">${eco}</text>` : '';

  return {
    svg:`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}"
          viewBox="0 0 ${W} ${H}" overflow="visible">
      ${affShape}
      ${branchSVG(branch, style.fill, style.stroke)}
      ${ecoMark}
    </svg>`,
    width:W, height:H
  };
}

// ════════════════════════════════════════════════
//  2. GLOBAL STATE
// ════════════════════════════════════════════════
let myCallsign='', myRoomID='';
let currentMode=null;
let selectedAff='F';
let drawingPoly=null, drawingLine=null, tempPolyPoints=[], tempPolyMarkers=[], tempPolyline=null;

// layerRegistry: id -> { layer, owner, type, data }
const layerRegistry = {};

function genId(){ return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }

// ════════════════════════════════════════════════
//  3. SOCKET.IO
// ════════════════════════════════════════════════
const socket = io();

// 1. 處理連線失敗
socket.on('join_failed', msg => { 
    alert('LOGIN FAILED:\n' + msg); 
    const overlay = document.getElementById('login-overlay');
    overlay.style.display = 'flex';
    document.getElementById('btn-finish-draw').style.display = 'none';
});

// 在你的前端 (script.js) 中加入：
socket.on('room_state', (data) => {
    // data.layers 就是伺服器傳來的歷史圖層陣列
    if (data.layers) {
        data.layers.forEach(layer => {
            // 這裡呼叫你的繪圖函式，例如：
            // drawSymbolOnMap(layer);
            console.log("已同步歷史圖層:", layer);
        });
    }
});

socket.on('join_success', data => {
    myCallsign = data.callsign; 
    myRoomID = data.room;
    
    document.getElementById('login-overlay').style.display = 'none';
    notify('CONNECTED — ROOM: ' + myRoomID);
});
    // 【新增這行】請求伺服器同步目前該房間的所有圖層資料
// 接收伺服器傳來的歷史紀錄
socket.on('room_sync', (layers) => {
    // 遍歷歷史圖層並渲染
    layers.forEach(entry => applyAction(entry, false));
});
socket.on('update_user_list', users => {
    document.getElementById('user-count').innerText = users.length;
    document.getElementById('user-list').innerHTML = users.map(u => `
        <div class="user-entry${u === myCallsign ? ' me' : ''}">
            <span class="dot online"></span>
            <span>${u}${u === myCallsign ? ' (YOU)' : ''}</span>
        </div>`).join('');
});
socket.on('server_action', payload => applyAction(payload, false));

// Emit helper
function broadcast(payload){
  socket.emit('client_action', Object.assign({ room: myRoomID }, payload));
}

// ════════════════════════════════════════════════
//  4. LAYER MANAGEMENT
// ════════════════════════════════════════════════

function applyAction(payload, isLocal){
  const { action, id, type, username, data } = payload;

  if(action==='draw'){
    if(layerRegistry[id]) return; // already exists (our own echo)
    const isOwner = username === myCallsign;
    if(type==='mil')         addMilLayer(id, data, username, isOwner);
    else if(type==='circle') addCircleLayer(id, data, username, isOwner);
    else if(type==='rect')   addRectLayer(id, data, username, isOwner);
    else if(type==='poly')   addPolyLayer(id, data, username, isOwner);
    else if(type==='line')   addLineLayer(id, data, username, isOwner);
  }
  else if(action==='move'){
    const reg = layerRegistry[id];
    if(!reg) return;
    updateLayerPosition(reg, data);
  }
  else if(action==='style'){
    const reg = layerRegistry[id];
    if(!reg) return;
    if(data.color) reg.layer.setStyle({color:data.color, fillColor:data.color});
    if(data.name!==undefined){
      reg.data.name = data.name;
      refreshTooltip(reg);
    }
  }
  else if(action==='delete'){
    const reg = layerRegistry[id];
    if(!reg) return;
    drawnItems.removeLayer(reg.layer);
    delete layerRegistry[id];
  }
}

function updateLayerPosition(reg, data){
  const l = reg.layer;
  try{
    if(reg.type==='mil')    l.setLatLng(data.latlng);
    else if(reg.type==='circle'){ l.setLatLng(data.latlng); l.setRadius(data.radius); }
    else if(reg.type==='rect')  l.setBounds(data.bounds);
    else if(reg.type==='poly'||reg.type==='line') l.setLatLngs(data.latlngs);
  }catch(e){}
  refreshTooltip(reg);
}

function refreshTooltip(reg){
  if(!reg.data.name) return;
  if(reg.layer.getTooltip()) reg.layer.closeTooltip();
  reg.layer.unbindTooltip();
  reg.layer.bindTooltip(reg.data.name,{permanent:true,direction:'center',className:'name-tooltip'}).openTooltip();
}

// ════════════════════════════════════════════════
//  5. ADD LAYER FUNCTIONS
// ════════════════════════════════════════════════

function attachPopup(layer, id, username){
  const isOwner = username===myCallsign;
  function buildPopupHTML(){
    const reg = layerRegistry[id];
    const currentName = reg ? (reg.data.name||'') : '';
    const currentColor = reg ? (reg.data.color||'#00ffcc') : '#00ffcc';
    return `<div class="lf-popup">
      <div class="pop-owner">DEPLOYED BY: ${username}</div>
      ${isOwner?`
      <label>LABEL</label>
      <input type="text" id="pop-name-${id}" value="${currentName}" placeholder="Unit name..." 
             onchange="onPopName('${id}',this.value)">
      <label>COLOR</label>
      <input type="color" id="pop-color-${id}" value="${currentColor}" 
             onchange="onPopColor('${id}',this.value)">
      <button class="pop-btn" onclick="onPopDelete('${id}')">DELETE LAYER</button>
      `:`<div class="no-perm">READ-ONLY — Cannot modify other units</div>`}
    </div>`;
  }
  layer.bindPopup(buildPopupHTML);
}

window.onPopName = function(id,val){
  const reg=layerRegistry[id]; if(!reg) return;
  reg.data.name=val;
  refreshTooltip(reg);
  broadcast({action:'style',id,data:{name:val}});
};
window.onPopColor = function(id,val){
  const reg=layerRegistry[id]; if(!reg) return;
  reg.data.color=val;
  if(reg.type==='mil'){
    // Rebuild mil SVG with tint overlay (simplified: just re-render)
  } else {
    reg.layer.setStyle({color:val,fillColor:val,fillOpacity:0.2});
  }
  broadcast({action:'style',id,data:{color:val}});
};
window.onPopDelete = function(id){
  const reg=layerRegistry[id]; if(!reg) return;
  if(reg.owner!==myCallsign){ notify('NO PERMISSION'); return; }
  drawnItems.removeLayer(reg.layer);
  delete layerRegistry[id];
  broadcast({action:'delete',id});
};

// --- MIL SYMBOL ---
function addMilLayer(id, data, username, isOwner){
  const sym = buildMilSVG(data.branch, data.echelon, data.aff);
  const icon = L.divIcon({
    html: sym.svg,
    className:'mil-icon-wrapper',
    iconSize:[sym.width, sym.height],
    iconAnchor:[sym.width/2, sym.height/2]
  });
  const marker = L.marker(data.latlng,{icon, draggable:isOwner, zIndexOffset:1000}).addTo(drawnItems);
  layerRegistry[id]={ layer:marker, owner:username, type:'mil', data:Object.assign({name:'',color:''},data) };
  attachPopup(marker, id, username);

  if(isOwner){
    enableMarkerDrag(marker, id);
  }
  return marker;
}

function enableMarkerDrag(marker, id){
  marker.on('dragend', function(){
    broadcast({action:'move', id, data:{ latlng: marker.getLatLng() }});
  });
}

// --- CIRCLE ---
function addCircleLayer(id, data, username, isOwner){
  const layer = L.circle(data.latlng,{
    radius:data.radius, color:'#00ffcc', fillColor:'#00ffcc', fillOpacity:0.12, weight:2
  }).addTo(drawnItems);
  layerRegistry[id]={ layer, owner:username, type:'circle', data:Object.assign({name:'',color:'#00ffcc'},data) };
  attachPopup(layer, id, username);
  if(isOwner) enableShapeDrag(layer, id, 'circle');
}

// --- RECT ---
function addRectLayer(id, data, username, isOwner){
  const layer = L.rectangle(data.bounds,{
    color:'#ffaa00', fillColor:'#ffaa00', fillOpacity:0.12, weight:2
  }).addTo(drawnItems);
  layerRegistry[id]={ layer, owner:username, type:'rect', data:Object.assign({name:'',color:'#ffaa00'},data) };
  attachPopup(layer, id, username);
  if(isOwner) enableShapeDrag(layer, id, 'rect');
}

// --- POLY ---
function addPolyLayer(id, data, username, isOwner){
  const layer = L.polygon(data.latlngs,{
    color:'#ff6666', fillColor:'#ff6666', fillOpacity:0.15, weight:2
  }).addTo(drawnItems);
  layerRegistry[id]={ layer, owner:username, type:'poly', data:Object.assign({name:'',color:'#ff6666'},data) };
  attachPopup(layer, id, username);
  if(isOwner) enableShapeDrag(layer, id, 'poly');
}

// --- LINE ---
function addLineLayer(id, data, username, isOwner){
  const layer = L.polyline(data.latlngs,{
    color:'#ffffaa', weight:3, dashArray:'8,4'
  }).addTo(drawnItems);
  layerRegistry[id]={ layer, owner:username, type:'line', data:Object.assign({name:'',color:'#ffffaa'},data) };
  attachPopup(layer, id, username);
  if(isOwner) enableShapeDrag(layer, id, 'line');
}

// ════════════════════════════════════════════════
//  6. SHAPE DRAG — Leaflet shapes are not natively
//     draggable; we implement it manually.
// ════════════════════════════════════════════════
function enableShapeDrag(layer, id, type){
  let dragging = false, startLatLng = null, origLatLngs = null, origCenter = null;

  // 統一處理拖曳開始的函式
  const onDragStart = function(e) {
    // 取得位置：優先獲取滑鼠位置，若無則獲取觸控位置
    const latlng = e.latlng || (e.touches && e.touches[0] ? map.mouseEventToLatLng(e.touches[0]) : null);
    if (!latlng) return;

    L.DomEvent.stopPropagation(e);
    dragging = true;
    startLatLng = latlng;
    document.body.classList.add('dragging-shape');
    map.dragging.disable();

    if(type==='circle'){
      origCenter = layer.getLatLng();
    } else {
      origLatLngs = layer.getLatLngs();
    }
  };

  // 統一處理移動與結束的函式
  const onMove = function(e){
    if(!dragging) return;
    // 獲取當前坐標
    const cur = e.latlng || (e.touches && e.touches[0] ? map.mouseEventToLatLng(e.touches[0]) : null);
    if(!cur) return;
    
    const dlat = cur.lat - startLatLng.lat;
    const dlng = cur.lng - startLatLng.lng;

    if(type==='circle'){
      layer.setLatLng(L.latLng(origCenter.lat+dlat, origCenter.lng+dlng));
    } else {
      layer.setLatLngs(shiftLatLngs(origLatLngs, dlat, dlng));
    }
    refreshTooltip(layerRegistry[id]);
  };

  const onUp = function(){
    if(!dragging) return;
    dragging = false;
    document.body.classList.remove('dragging-shape');
    map.dragging.enable();

    // 廣播更新
    const reg = layerRegistry[id];
    if(reg) {
      let moveData = (type==='circle') ? {latlng:layer.getLatLng(), radius:layer.getRadius()} : {latlngs:layer.getLatLngs()};
      broadcast({action:'move', id, data:moveData});
    }
  };

  // 綁定事件：同時處理 mouse 與 touch
  layer.on('mousedown touchstart', onDragStart);
  map.on('mousemove touchmove', onMove);
  map.on('mouseup touchend', onUp);
}

// Recursively shift nested LatLng arrays
function shiftLatLngs(latlngs, dlat, dlng){
  if(!Array.isArray(latlngs)) return L.latLng(latlngs.lat+dlat, latlngs.lng+dlng);
  if(latlngs.length && latlngs[0] && latlngs[0].lat!==undefined){
    return latlngs.map(ll => L.latLng(ll.lat+dlat, ll.lng+dlng));
  }
  return latlngs.map(sub => shiftLatLngs(sub, dlat, dlng));
}

// ════════════════════════════════════════════════
//  7. DRAWING MODE ENGINE
// ════════════════════════════════════════════════
function cancelCurrentDraw(){
  // Cleanup polygon/line temp state
  if(tempPolyMarkers.length){ tempPolyMarkers.forEach(m=>map.removeLayer(m)); tempPolyMarkers=[]; }
  if(tempPolyline){ map.removeLayer(tempPolyline); tempPolyline=null; }
  tempPolyPoints=[];
  drawingPoly=false; drawingLine=false;
  map.off('click', polyClickHandler);
  map.off('dblclick', polyDblClickHandler);
  map.getContainer().style.cursor='';
}

window.setMode = function(mode){
  cancelCurrentDraw();
  currentMode = mode;
  updateModeButtons(mode);
if(mode === 'poly' || mode === 'line'){
        document.getElementById('btn-finish-draw').style.display = 'block';
        map.dragging.disable(); 
    }
  if(mode==='mil'){
    map.getContainer().style.cursor='crosshair';
    map.once('click', function(e){
      currentMode=null;
      map.getContainer().style.cursor='';
      updateModeButtons(null);
      const id=genId();
      const branch=document.getElementById('sel-branch').value;
      const echelon=document.getElementById('sel-echelon').value;
      const aff=selectedAff;
      const data={latlng:e.latlng, branch, echelon, aff};
      // Local
      addMilLayer(id, data, myCallsign, true);
      // Broadcast
      broadcast({action:'draw', type:'mil', id, username:myCallsign, data});
    });
  }
  else if(mode==='circle'){
    map.getContainer().style.cursor='crosshair';
    map.once('click', function(e){
      const center=e.latlng;
      map.getContainer().style.cursor='cell';
      map.once('click', function(e2){
        currentMode=null;
        map.getContainer().style.cursor='';
        updateModeButtons(null);
        const radius=center.distanceTo(e2.latlng);
        const id=genId();
        const data={latlng:center, radius};
        addCircleLayer(id, data, myCallsign, true);
        broadcast({action:'draw', type:'circle', id, username:myCallsign, data});
      });
    });
    notify('Click center, then click edge to set radius');
  }
  else if(mode==='rect'){
    map.getContainer().style.cursor='crosshair';
    map.once('click', function(e){
      const p1=e.latlng;
      map.getContainer().style.cursor='cell';
      map.once('click', function(e2){
        currentMode=null;
        map.getContainer().style.cursor='';
        updateModeButtons(null);
        const bounds=L.latLngBounds(p1, e2.latlng);
        const id=genId();
        const data={bounds};
        addRectLayer(id, data, myCallsign, true);
        broadcast({action:'draw', type:'rect', id, username:myCallsign, data});
      });
    });
    notify('Click two corners to define rectangle');
  }
  else if(mode==='poly'){
    drawingPoly=true;
    tempPolyPoints=[];
    map.getContainer().style.cursor='crosshair';
    map.on('click', polyClickHandler);
    map.on('dblclick', polyDblClickHandler);
    notify('Click to add points — double-click to finish polygon');
  }
  else if(mode==='line'){
    drawingLine=true;
    tempPolyPoints=[];
    map.getContainer().style.cursor='crosshair';
    map.on('click', polyClickHandler);
    map.on('dblclick', polyDblClickHandler);
    notify('Click to add points — double-click to finish polyline');
  }
};

function polyClickHandler(e){
  L.DomEvent.stopPropagation(e);
  tempPolyPoints.push(e.latlng);
  // Visual feedback dot
  const dot = L.circleMarker(e.latlng,{radius:4,color:'#00ffcc',fillColor:'#00ffcc',fillOpacity:1,weight:1}).addTo(map);
  tempPolyMarkers.push(dot);
  // Update preview line
  if(tempPolyline) map.removeLayer(tempPolyline);
  if(tempPolyPoints.length>1){
    tempPolyline=L.polyline(tempPolyPoints,{color:'#00ffcc',weight:1.5,dashArray:'4,4',opacity:.7}).addTo(map);
  }
}

function polyDblClickHandler(e){
  L.DomEvent.stopPropagation(e);
  if(tempPolyPoints.length<2){ cancelCurrentDraw(); return; }
  const pts=[...tempPolyPoints];
  const wasLine=drawingLine;
  cancelCurrentDraw();
  currentMode=null;
  map.getContainer().style.cursor='';
  updateModeButtons(null);

  const id=genId();
  if(wasLine){
    const data={latlngs:pts};
    addLineLayer(id, data, myCallsign, true);
    broadcast({action:'draw', type:'line', id, username:myCallsign, data});
  } else {
    const data={latlngs:pts};
    addPolyLayer(id, data, myCallsign, true);
    broadcast({action:'draw', type:'poly', id, username:myCallsign, data});
  }
}

// ════════════════════════════════════════════════
//  8. UI HELPERS
// ════════════════════════════════════════════════
const MODE_BTNS = ['btn-place-mil','btn-circle','btn-rect','btn-poly','btn-line'];
function updateModeButtons(mode){
  MODE_BTNS.forEach(bid=>{
    const btn=document.getElementById(bid);
    if(btn) btn.classList.remove('active');
  });
  const map2={mil:'btn-place-mil',circle:'btn-circle',rect:'btn-rect',poly:'btn-poly',line:'btn-line'};
  if(mode && map2[mode]) document.getElementById(map2[mode]).classList.add('active');
}

window.selectAff = function(btn){
  document.querySelectorAll('#aff-btns .btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedAff = btn.dataset.aff;
};

window.toggleSection = function(id, hdr){
    console.log("Toggling:", id); // 看看點擊時控制台有沒有跳出這行
    const body = document.getElementById(id);
    body.classList.toggle('closed');
    const arr = hdr.querySelector('span');
    if(arr) arr.innerText = body.classList.contains('closed') ? '▶' : '▼';
};
window.onRoomPresetChange = function(){
  const v=document.getElementById('inp-room-preset').value;
  document.getElementById('inp-room-custom').style.display=(v==='CUSTOM')?'block':'none';
};

window.joinNetwork = function(){
    const cs = document.getElementById('inp-callsign').value.trim();
    if(!cs){ alert('Please enter a callsign'); return; }
    
    const preset = document.getElementById('inp-room-preset').value;
    let room = (preset === 'CUSTOM') 
        ? document.getElementById('inp-room-custom').value.trim() 
        : preset;
        
    if(!room){ alert('Please enter a room code'); return; }

    // 【重要】發送連線請求前，先確保 Socket 是開啟的
    if (socket.disconnected) {
        socket.connect();
    }
    
    socket.emit('request_join', { callsign: cs, room });
};

window.clearMyLayers = function(){
  const toDelete=[];
  Object.keys(layerRegistry).forEach(id=>{
    if(layerRegistry[id].owner===myCallsign) toDelete.push(id);
  });
  toDelete.forEach(id=>{
    drawnItems.removeLayer(layerRegistry[id].layer);
    delete layerRegistry[id];
    broadcast({action:'delete',id});
  });
  notify('CLEARED '+toDelete.length+' LAYERS');
};

function notify(msg){
  const box=document.getElementById('notif');
  const el=document.createElement('div');
  el.className='notif-item';
  el.innerText=msg;
  box.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },3200);
}

// ════════════════════════════════════════════════
//  9. PANEL DRAG (status + action panels)
// ════════════════════════════════════════════════
document.querySelectorAll('.panel .panel-hdr').forEach(hdr=>{
  const panel=hdr.parentElement;
  let dragging=false, ox=0, oy=0;
  hdr.addEventListener('mousedown',e=>{
    dragging=true;
    ox=e.clientX-panel.offsetLeft;
    oy=e.clientY-panel.offsetTop;
    panel.style.right='auto'; panel.style.bottom='auto';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    panel.style.left=(e.clientX-ox)+'px';
    panel.style.top=(e.clientY-oy)+'px';
  });
  document.addEventListener('mouseup',()=>{ dragging=false; });
});

// Prevent map click when clicking panels
document.getElementById('action-panel').addEventListener('click', e => {
    // 如果點擊的是收折標題或選單內的元素，不要阻止傳播，讓它們能觸發自己的 onclick
    if (e.target.closest('.section-hdr') || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') {
        return; 
    }
    e.stopPropagation();
}, { capture: true });
document.getElementById('status-panel').addEventListener('click',e=>e.stopPropagation());

// Disable map double-click zoom (we use dblclick for poly/line finish)
map.doubleClickZoom.disable();

// Keyboard ESC to cancel draw
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ cancelCurrentDraw(); currentMode=null; updateModeButtons(null); map.getContainer().style.cursor=''; }
});

const panels = ['action-panel', 'status-panel'];
.panel {
    pointer-events: auto;
    z-index: 10; /* 確保面板在地圖之上 */
}

        el.addEventListener('click', handler, {capture: true});
    }
});
