<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>多人共同即時地圖</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Socket.io & Leaflet JS -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        const socket = io();

        // 1. 初始化 OpenStreetMap 地圖
        const map = L.map('map').setView([25.0339, 121.5644], 13); // 預設台北
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. 建立一個圖層來放置大家畫的圖形
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        // 3. 配置 Leaflet.draw 工具列（圓形、方形、多邊形、線條）
        const drawControl = new L.Control.Draw({
            draw: {
                polyline: true,
                polygon: true,
                rectangle: true,
                circle: true,
                marker: false, // 關閉單點標記，專注在幾何圖形
                circlemarker: false
            },
            edit: {
                featureGroup: drawnItems,
                remove: true
            }
        });
        map.addControl(drawControl);

        // 4. 當本機使用者「完成繪圖」時觸發
        map.on(L.Draw.Event.CREATED, function (e) {
            const layer = e.layer;
            const type = e.layerType;
            drawnItems.addLayer(layer);

            // 將圖形轉化成 JSON 數據
            const geoJsonData = layer.toGeoJSON();
            
            // 由於 Leaflet.toGeoJSON() 不包含圓形的半徑，如果是圓形需特別處理
            const extraData = {
                type: type,
                geometry: geoJsonData.geometry,
                properties: {}
            };
            if (type === 'circle') {
                extraData.radius = layer.getRadius();
                extraData.latlng = layer.getLatLng();
            }

            // 發送到後端伺服器
            socket.emit('draw-shape', extraData);
        });

        // 5. 接收伺服器發來的「歷史圖形」或「其他人新畫的圖形」
        function renderShape(shapeData) {
            let remoteLayer;
            if (shapeData.type === 'circle') {
                remoteLayer = L.circle(shapeData.latlng, { radius: shapeData.radius });
            } else {
                remoteLayer = L.geoJSON(shapeData.geometry);
            }
            remoteLayer.setStyle({ color: '#ff4455', weight: 4 }); // 區分他人畫的顏色
            drawnItems.addLayer(remoteLayer);
        }

        socket.on('init-shapes', (shapes) => {
            shapes.forEach(renderShape);
        });

        socket.on('user-drew-shape', (shapeData) => {
            renderShape(shapeData);
        });

        socket.on('map-cleared', () => {
            drawnItems.clearLayers();
        });
    </script>
</body>
</html>
