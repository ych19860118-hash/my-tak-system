<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戰術防災分組協同即時地圖</title>
    <link rel="stylesheet" href="/leaflet/leaflet.css" />
    <script src="/socket.io/socket.io.js"></script>
    <script src="/leaflet/leaflet.js"></script>
    <style>
        /* 💡 戰術雷達網格花紋背景 */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Courier New', Courier, monospace, sans-serif; 
            background-color: #0b0c0e; 
            background-image: 
                linear-gradient(rgba(34, 197, 94, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 197, 94, 0.04) 1px, transparent 1px);
            background-size: 30px 30px; background-position: center;
        }
        #map { width: 100%; height: 100vh; display: none; background: #111214; } 
        
        /* 軍用雷達戰術風登入艙 */
        #login-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #141619; padding: 40px 30px; border-radius: 4px; 
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.15); text-align: center; z-index: 2000;
            border: 2px solid #22c55e; width: 310px;
        }
        #login-box h2 { 
            color: #22c55e; margin-bottom: 25px; font-weight: bold; font-size: 20px; 
            letter-spacing: 2px; text-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            text-transform: uppercase;
        }
        #login-box input, #login-box select { 
            display: block; margin: 14px auto; padding: 12px; width: 92%; 
            background: #1a1d21; border: 1px solid #2d3748; border-radius: 2px; 
            color: #39ff14; font-size: 14px; outline: none; box-sizing: border-box;
            font-family: monospace; transition: all 0.2s;
        }
        #login-box input:focus, #login-box select:focus { 
            border-color: #39ff14; box-shadow: 0 0 8px rgba(57, 255, 20, 0.3);
        }
        #login-box button { 
            width: 92%; padding: 12px; background: #1b4d22; color: #39ff14; 
            border: 1px solid #39ff14; border-radius: 2px; cursor: pointer; font-size: 15px; 
            font-weight: bold; margin-top: 15px; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); transition: all 0.2s;
        }
        #login-box button:hover { background: #22c55e; color: #0d0e10; box-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
        #login-error { color: #ef4444; font-size: 13px; margin-top: 12px; min-height: 20px; font-weight: bold; }
        
        /* 側邊垂直工具列 */
        #custom-toolbar { position: absolute; top: 25px; left: 12px; z-index: 1000; display: none; flex-direction: column; gap: 10px; }
        .tool-btn {
            width: 44px !important; height: 44px !important; background: #141619 !important; background-image: none !important;
            border: 1px solid #2d3748 !important; border-radius: 4px !important; cursor: pointer;
            display: flex !important; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin: 0 !important; padding: 0 !important;
        }
        .tool-btn svg { stroke: #a0aec0 !important; }
        .tool-btn:hover { background: #1a1d21 !important; border-color: #4a5568 !important; }
        .tool-btn.active { background: #22c55e !important; border-color: #39ff14 !important; }
        .tool-btn.active svg, #btn-locate.active svg { stroke: #0d0e10 !important; }
        
        .popup-menu { font-size: 13px; min-width: 190px; font-family: monospace; color: #a0aec0; }
        .popup-menu input[type="text"] { width: 92%; padding: 6px; margin-bottom: 10px; background: #1a1d21; border: 1px solid #2d3748; color: #39ff14; font-family: monospace; }
        .popup-menu button { width: 100%; padding: 8px; background: #007bff; color: white; border: none; border-radius: 2px; cursor: pointer; font-weight: bold; }
        .popup-menu button.del-btn { background: #e53e3e; margin-top: 5px; }
        
        .control-pin-icon { font-size: 20px; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,0.5); cursor: move; }
        .resize-pin-icon { font-size: 18px; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,0.5); cursor: se-resize; }
        
        #toggle-info-btn {
            position: absolute; bottom: 20px; right: 12px; z-index: 1001; width: 38px; height: 34px; background: #141619; 
            border: 1px solid #2d3748; border-radius: 4px; cursor: pointer; font-size: 15px; color: #22c55e; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #toggle-info-btn:hover { border-color: #22c55e; }
        #typhoon-info {
            position: absolute; bottom: 65px; right: 12px; background: #141619; padding: 15px; border-radius: 4px; color: #a0aec0; z-index: 1000;
            border: 1px solid #22c55e; font-size: 12px; display: none !important; max-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); line-height: 1.6;
        }
        .tactical-tooltip {
            background: #141619 !important; border: 2px solid #39ff14 !important; color: #39ff14 !important; font-weight: 900 !important; font-size: 13px !important;
            font-family: 'Courier New', monospace !important; border-radius: 4px !important; padding: 5px 10px !important; box-shadow: 0 0 12px rgba(57, 255, 20, 0.4) !important; opacity: 1 !important; z-index: 10000 !important;
        }
        .tactical-tooltip::before { display: none !important; }
    </style>
</head>
<body>
        <div id="login-box">
        <h2>COP SYSTEM情資平台</h2>
        <input type="text" id="username" placeholder="OPERATOR ID (暱稱)">
        <select id="room-select" onchange="checkRoomType()">
            <option value="public_1">公開頻道(風災)</option>
            <option value="public_2">公開頻道(震災)</option>
            <option value="custom">新增私人指管頻道...</option>
        </select>
        <input type="text" id="custom-room-name" placeholder="ENTER NEW ROOM ID" style="display:none;">
        <input type="password" id="room-password" placeholder="SECURE ACCESS KEY (密碼)">
        <button onclick="login()">進入情資地圖</button>
        <p id="login-error"></p>
    </div>

    <div id="custom-toolbar">
        <button class="tool-btn" id="btn-marker" onclick="switchTool('marker')">📍</button>
        <button class="tool-btn" id="btn-polyline" onclick="switchTool('polyline')">📈</button>
        <button class="tool-btn" id="btn-rectangle" onclick="switchTool('rectangle')">⬜</button>
        <button class="tool-btn" id="btn-circle" onclick="switchTool('circle')">⭕</button>
        <button class="tool-btn" id="btn-polygon" onclick="switchTool('polygon')">⬧</button>
        <button class="tool-btn" id="btn-locate" onclick="locateUserGPS()" style="margin-top:15px!important;border-color:#22c55e!important;">🛰️</button>
    </div>

    <button id="toggle-info-btn" onclick="toggleStatusPanel()">ℹ</button>
    <div id="typhoon-info">
        <b style="color:#22c55e;">NET NODE: <span id="state-room" style="color:#39ff14;"></span></b><br>
        ONLINE: <b id="state-count" style="color:#39ff14;">0</b>
    </div>
    <div id="map"></div>
        <script>
        const SERVER_URL = window.location.origin; 
        let socket, currentUser = "", currentRoom = "", map, allMapLayers = {};
        let currentTool = "pan", tempPoints = [], tempShape = null;

        function getFormattedTime() {
            const now = new Date();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            return `${m}/${d} ${h}:${min}`;
        }

        function checkRoomType() {
            const select = document.getElementById('room-select').value;
            document.getElementById('custom-room-name').style.display = (select === 'custom') ? 'block' : 'none';
        }

        function initMapInstance() {
            if (map) return; 
            map = L.map('map', { doubleClickZoom: false, zoomControl: false }).setView([23.6, 121], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            L.DomEvent.disableClickPropagation(document.getElementById('custom-toolbar'));
            window.addEventListener('resize', () => { if (map) map.invalidateSize(); });
            initDrawingEvents();
        }

        function switchTool(tool) {
            currentTool = tool; 
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if (tempShape) { map.removeLayer(tempShape); tempShape = null; } 
            tempPoints = [];
            const id = 'btn-' + tool; 
            if (document.getElementById(id)) document.getElementById(id).classList.add('active'); 
        }

        function initDrawingEvents() {
            map.on('click', function(e) {
                const lat = e.latlng.lat, lng = e.latlng.lng;
                if (currentTool === 'marker') {
                    const msg = prompt("請輸入災情狀況：") || "未命名災情";
                    const data = { id: 'obj_' + Date.now(), shapeType: "marker", coordinates: [lat, lng], message: msg, creator: currentUser, color: "#3388ff", time: getFormattedTime() };
                    renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                } else if (currentTool === 'polyline' || currentTool === 'polygon') {
                    tempPoints.push([lat, lng]);
                    if (tempPoints.length === 1) tempShape = L.polyline(tempPoints, {color: '#3388ff', weight: 6}).addTo(map);
                    else tempShape.setLatLngs(tempPoints);
                } else if (currentTool === 'rectangle') {
                    tempPoints.push({ lat: lat, lng: lng });
                    if (tempPoints.length === 2) {
                        const msg = prompt("請輸入區域說明：") || "未命名區域";
                        const latMin = Math.min(tempPoints[0].lat, tempPoints[1].lat);
                        const latMax = Math.max(tempPoints[0].lat, tempPoints[1].lat);
                        const lngMin = Math.min(tempPoints[0].lng, tempPoints[1].lng);
                        const lngMax = Math.max(tempPoints[0].lng, tempPoints[1].lng);
                        const data = { id: 'obj_' + Date.now(), shapeType: "rectangle", coordinates: [[latMin, lngMin], [latMax, lngMax]], message: msg, creator: currentUser, color: "#3388ff", time: getFormattedTime() };
                        renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                    }
                } else if (currentTool === 'circle') {
                    if (tempPoints.length === 0) {
                        tempPoints.push({ lat: lat, lng: lng });
                        tempShape = L.circle([lat, lng], {radius: 100, color: '#3388ff'}).addTo(map);
                    } else {
                        const radius = map.distance(L.latLng(tempPoints[0].lat, tempPoints[0].lng), L.latLng(lat, lng));
                        const msg = prompt("請輸入圓形影響範圍：") || "未命名區域";
                        const data = { id: 'obj_' + Date.now(), shapeType: "circle", coordinates: [tempPoints[0].lat, tempPoints[0].lng], radius: radius, message: msg, creator: currentUser, color: "#3388ff", time: getFormattedTime() };
                        if (tempShape) map.removeLayer(tempShape); 
                        renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
                    }
                }
            });

            map.on('contextmenu', function() {
                if (tempPoints.length < 2) return;
                const type = currentTool;
                const msg = prompt(type === 'polyline' ? "請輸入細線說明：" : "請輸入多邊形說明：") || "未命名圖形";
                const data = { id: 'obj_' + Date.now(), shapeType: type, coordinates: [...tempPoints], message: msg, creator: currentUser, color: "#3388ff", time: getFormattedTime() };
                if (tempShape) map.removeLayer(tempShape); renderObjectOnMap(data); socket.emit('new_object', data); switchTool('pan');
            });
        }
            async function login() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('room-password').value;
            const roomSel = document.getElementById('room-select').value;
            let targetRoom = roomSel === 'custom' ? document.getElementById('custom-room-name').value.trim() : roomSel;
            if(!userIn) { alert("請輸入通報暱稱！"); return; }
            try {
                const res = await fetch(`${SERVER_URL}/api/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: userIn, roomPassword: passIn, roomName: targetRoom })
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = data.username; currentRoom = data.roomName;
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('map').style.display = 'block'; 
                    document.getElementById('custom-toolbar').style.display = 'flex'; 
                    document.getElementById('toggle-info-btn').style.display = 'flex';
                    document.getElementById('state-room').innerText = currentRoom;
                    initMapInstance(); setTimeout(() => { if (map) map.invalidateSize(); }, 300); initSocketAndLayers(); 
                } else { document.getElementById('login-error').innerText = data.message; }
            } catch (err) { document.getElementById('login-error').innerText = "連線後端錯誤！"; }
        }

        function initSocketAndLayers() {
            socket = io(SERVER_URL);
            socket.emit('join_room', { roomName: currentRoom, username: currentUser });
            socket.on('history_objects', function(objects) { if (Array.isArray(objects)) objects.forEach(obj => renderObjectOnMap(obj)); });
            socket.on('update_user_count', function(count) { document.getElementById('state-count').innerText = count; });

            let peerGPSMarkers = {}; 
            socket.on('peer_gps_updated', function(gpsData) {
                const pName = gpsData.username, pLatLng = L.latLng(gpsData.lat, gpsData.lng);
                if (peerGPSMarkers[pName]) map.removeLayer(peerGPSMarkers[pName]);
                const peerCenterDot = L.circle(pLatLng, { radius: 10, color: '#39ff14', fillColor: '#39ff14', fillOpacity: 0.8, weight: 1 })
                    .bindTooltip(pName, { permanent: true, direction: 'top', className: 'tactical-tooltip', interactive: false });
                const peerAccuracyCircle = L.circle(pLatLng, { radius: gpsData.accuracy, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.1, weight: 1 });
                peerGPSMarkers[pName] = L.layerGroup([peerCenterDot, peerAccuracyCircle]).addTo(map);
            });

            socket.on('object_added', data => renderObjectOnMap(data));
            socket.on('object_deleted', id => {
                if (allMapLayers[id]) {
                    map.removeLayer(allMapLayers[id].layer);
                    if (allMapLayers[id].pin) map.removeLayer(allMapLayers[id].pin);
                    if (allMapLayers[id].resizePin) map.removeLayer(allMapLayers[id].resizePin);
                    delete allMapLayers[id];
                }
            });
        }
                    function renderObjectOnMap(data) {
            if (allMapLayers[data.id]) return;
            let mainLayer, centerLatLng, isMyObject = (data.creator === currentUser);
            const pts = data.coordinates;

            if (data.shapeType === "marker") {
                const svgColor = data.color || "#3388ff";
                const customMarkerIcon = L.divIcon({
                    html: `<svg width="30" height="42" viewBox="0 0 24 24" fill="${svgColor}" stroke="#141619" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.6)); position: absolute; left: -15px; top: -42px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3" fill="#141619"></circle></svg>`,
                    className: 'tactical-svg-marker'
                });
                mainLayer = L.marker(pts, { icon: customMarkerIcon }); 
                centerLatLng = L.latLng(pts);
            } else if (data.shapeType === "polyline") {
                mainLayer = L.polyline(pts, { color: data.color, weight: 6, interactive: true });
                centerLatLng = L.polyline(pts).getBounds().getCenter();
            } else if (data.shapeType === "rectangle") {
                mainLayer = L.rectangle(pts, { color: data.color, fillColor: data.color, fillOpacity: 0.4, weight: 4 });
                centerLatLng = L.rectangle(pts).getBounds().getCenter();
            } else if (data.shapeType === "circle") {
                mainLayer = L.circle(pts, { radius: data.radius, color: data.color, fillColor: data.color, fillOpacity: 0.4, weight: 4 });
                centerLatLng = L.latLng(pts);
            } else if (data.shapeType === "polygon") {
                mainLayer = L.polygon(pts, { color: data.color, fillColor: data.color, fillOpacity: 0.4, weight: 4 });
                centerLatLng = L.polygon(pts).getBounds().getCenter();
            }
            if (!mainLayer) return;
            mainLayer.addTo(map);

            allMapLayers[data.id] = { layer: mainLayer, pin: null, resizePin: null };

            if (data.shapeType === "marker") {
                mainLayer.bindTooltip(data.message, { permanent: true, className: 'tactical-tooltip', interactive: false });
            } else {
                mainLayer.bindTooltip(data.message, { permanent: true, direction: 'center', className: 'tactical-tooltip', interactive: false });
            }

            if (isMyObject && data.shapeType !== "marker") {
                const controlPin = L.marker(centerLatLng, { draggable: true, icon: L.divIcon({ html: '📌', className: 'control-pin-icon' }) }).addTo(map);
                allMapLayers[data.id].pin = controlPin;

                controlPin.on('click', function() { mainLayer.openPopup(centerLatLng); });

                let startLatLng = centerLatLng;
                controlPin.on('drag', function(e) {
                    const nextLatLng = e.latlng;
                    const offsetLat = nextLatLng.lat - startLatLng.lat;
                    const offsetLng = nextLatLng.lng - startLatLng.lng;

                    if (data.shapeType === "circle") { 
                        mainLayer.setLatLng(nextLatLng); 
                        if (allMapLayers[data.id].resizePin) {
                            allMapLayers[data.id].resizePin.setLatLng(L.latLng(nextLatLng.lat, nextLatLng.lng + (mainLayer.getRadius() / 111320)));
                        }
                    } else if (data.shapeType === "rectangle") {
                        const b = mainLayer.getBounds();
                        mainLayer.setBounds([[b.getSouthWest().lat + offsetLat, b.getSouthWest().lng + offsetLng], [b.getNorthEast().lat + offsetLat, b.getNorthEast().lng + offsetLng]]);
                        if (allMapLayers[data.id].resizePin) allMapLayers[data.id].resizePin.setLatLng(mainLayer.getBounds().getNorthEast());
                    } else if (mainLayer.getLatLngs) {
                        const movePoints = function(points) { return points.map(p => { if (Array.isArray(p)) return movePoints(p); return L.latLng(p.lat + offsetLat, p.lng + offsetLng); }); };
                        mainLayer.setLatLngs(movePoints(mainLayer.getLatLngs()));
                    }
                    startLatLng = nextLatLng; 
                });

                controlPin.on('dragend', function() { syncGeometryChanges(data, mainLayer); });

                if (data.shapeType === "circle" || data.shapeType === "rectangle") {
                    const resizeLatLng = (data.shapeType === "circle") ? L.latLng(centerLatLng.lat, centerLatLng.lng + (data.radius / 111320)) : mainLayer.getBounds().getNorthEast();
                    const resizePin = L.marker(resizeLatLng, { draggable: true, icon: L.divIcon({ html: '📐', className: 'resize-pin-icon' }) }).addTo(map);
                    allMapLayers[data.id].resizePin = resizePin;

                    resizePin.on('drag', function(e) {
                        const newPinLatLng = e.latlng;
                        if (data.shapeType === "circle") {
                            const newRadius = map.distance(mainLayer.getLatLng(), newPinLatLng);
                            if (newRadius > 5) mainLayer.setRadius(newRadius);
                        } else if (data.shapeType === "rectangle") {
                            const centerP = controlPin.getLatLng();
                            const oppositeLat = centerP.lat - (newPinLatLng.lat - centerP.lat);
                            const oppositeLng = centerP.lng - (newPinLatLng.lng - centerP.lng);
                            mainLayer.setBounds([[oppositeLat, oppositeLng], [newPinLatLng.lat, newPinLatLng.lng]]);
                        }
                    });
                    resizePin.on('dragend', function() { syncGeometryChanges(data, mainLayer); });
                }
            } else if (isMyObject && data.shapeType === "marker") {
                mainLayer.dragging.enable();
                mainLayer.on('dragend', function() {
                    data.coordinates = [mainLayer.getLatLng().lat, mainLayer.getLatLng().lng];
                    data.time = getFormattedTime();
                    socket.emit('delete_object', data.id); socket.emit('new_object', data);
                });
            }

            mainLayer.on('click', function() {
                if (data.shapeType === "marker") mainLayer.openPopup();
                else mainLayer.openPopup(centerLatLng);
            });

            let popupContent = "";
            const displayTime = data.time || "無紀錄";

            if (isMyObject) {
                popupContent = `
                    <div class="popup-menu">
                        <b>編輯您回報的災情</b><br>
                        <small style="color:#22c55e;">最後異動：${displayTime}</small><br><br>
                        <label>修改描述：</label>
                        <input type="text" id="edit-msg-${data.id}" value="${data.message}">
                        <div style="margin-bottom:12px; display:flex; align-items:center; gap:8px;">
                            <label>戰術調色盤：</label>
                            <input type="color" id="edit-color-${data.id}" value="${data.color || '#3388ff'}" style="width:45px; height:28px; padding:0; border:1px solid #2d3748; background:none; cursor:pointer; border-radius:2px;">
                        </div>
                        <button onclick="updateObject('${data.id}')" style="background:#007bff; margin-bottom:5px;">儲存修改</button>
                        <button onclick="deleteObject('${data.id}')" style="margin-top:5px; background:#e53e3e;">撤銷此回報</button>
                    </div>`;
            } else {
                popupContent = `
                    <div class="popup-menu">
                        <b style="color:#ffc107;">⚠️ 災情回報狀況</b><br><br>
                        <b>內容：</b>${data.message}<br>
                        <small style="color:gray;">回報身分: ${data.creator}</small>
                    </div>`;
            }
            mainLayer.bindPopup(popupContent);
        }
                    function syncGeometryChanges(data, mainLayer) {
            let currentCoordinates = null, currentRadius = null;
            if (data.shapeType === "circle") {
                currentCoordinates = [mainLayer.getLatLng().lat, mainLayer.getLatLng().lng]; currentRadius = mainLayer.getRadius();
            } else if (data.shapeType === "rectangle") {
                const b = mainLayer.getBounds();
                currentCoordinates = [[b.getSouthWest().lat, b.getSouthWest().lng], [b.getNorthEast().lat, b.getNorthEast().lng]];
            } else if (mainLayer.getLatLngs) {
                currentCoordinates = mainLayer.getLatLngs().map(p => [p.lat, p.lng]);
            }
            data.time = getFormattedTime();
            const payload = { id: data.id, shapeType: data.shapeType, coordinates: currentCoordinates, radius: currentRadius, angle: 0, message: mainLayer.getTooltip().getContent(), color: mainLayer.options.color || data.color, creator: currentUser, time: data.time };
            socket.emit('delete_object', data.id); socket.emit('new_object', payload);
        }

        function deleteObject(objectId) {
            if (confirm("確定要撤銷這個災情回報嗎？")) {
                if (allMapLayers[objectId]) {
                    map.removeLayer(allMapLayers[objectId].layer);
                    if (allMapLayers[objectId].pin) map.removeLayer(allMapLayers[objectId].pin);
                    if (allMapLayers[objectId].resizePin) map.removeLayer(allMapLayers[objectId].resizePin);
                    delete allMapLayers[objectId];
                }
                socket.emit('delete_object', objectId);
            }
        }

        function updateObject(objectId) {
            const newMsg = document.getElementById(`edit-msg-${objectId}`).value.trim();
            if (allMapLayers[objectId]) {
                const cache = allMapLayers[objectId];
                const isCircle = !!cache.layer.options.radius;
                const isRect = !isCircle && cache.layer instanceof L.Rectangle;
                const isMarker = !isCircle && !isRect && (cache.layer instanceof L.Marker);
                let sType = "polygon"; 
                if (isCircle) sType = "circle"; else if (isRect) sType = "rectangle"; else if (isMarker) sType = "marker";

                const newColor = document.getElementById(`edit-color-${objectId}`) ? document.getElementById(`edit-color-${objectId}`).value : '#3388ff';
                let currentCoordinates = null, currentRadius = null;

                if (isCircle) {
                    currentCoordinates = [cache.layer.getLatLng().lat, cache.layer.getLatLng().lng]; currentRadius = cache.layer.getRadius();
                } else if (isRect || isMarker) {
                    currentCoordinates = [cache.layer.getLatLng().lat, cache.layer.getLatLng().lng];
                    if (!isMarker) {
                        const b = cache.layer.getBounds();
                        currentCoordinates = [[b.getSouthWest().lat, b.getSouthWest().lng], [b.getNorthEast().lat, b.getNorthEast().lng]];
                    }
                } else {
                    currentCoordinates = cache.layer.getLatLngs().map(p => [p.lat, p.lng]);
                }

                const updatedData = { id: objectId, shapeType: sType, coordinates: currentCoordinates, radius: currentRadius, angle: 0, message: newMsg, color: newColor, creator: currentUser, time: getFormattedTime() };
                map.removeLayer(cache.layer); if (cache.pin) map.removeLayer(cache.pin); if (cache.resizePin) map.removeLayer(cache.resizePin);
                delete allMapLayers[objectId];
                renderObjectOnMap(updatedData);
                socket.emit('delete_object', objectId); socket.emit('new_object', updatedData);
            }
        }

        function toggleStatusPanel() {
            const panel = document.getElementById('typhoon-info');
            panel.style.display = (window.getComputedStyle(panel).display === 'none') ? 'block' : 'none';
        }

        let myLocationMarker = null;
        function locateUserGPS() {
            if (!navigator.geolocation) { alert("錯誤：不支援 GPS 定位！"); return; }
            const locateBtn = document.getElementById('btn-locate'); locateBtn.style.background = '#22c55e';
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const userLat = position.coords.latitude, userLng = position.coords.longitude, accuracy = position.coords.accuracy;
                    const currentLatLng = L.latLng(userLat, userLng);
                    if (myLocationMarker) map.removeLayer(myLocationMarker);
                    const myCenterDot = L.circle(currentLatLng, { radius: 10, color: '#39ff14', fillColor: '#39ff14', fillOpacity: 0.9, weight: 1 }).bindTooltip(currentUser + " (您)", { permanent: true, direction: 'top', className: 'tactical-tooltip', interactive: false });
                    const myAccuracyCircle = L.circle(currentLatLng, { radius: accuracy, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 0.15, weight: 1 });
                    myLocationMarker = L.layerGroup([myCenterDot, myAccuracyCircle]).addTo(map);
                    map.setView(currentLatLng, 15, { animate: true, duration: 1.5 });
                    if (socket) socket.emit('share_my_gps', { lat: userLat, lng: userLng, accuracy: accuracy });
                    locateBtn.style.background = '#141619';
                },
                function() { locateBtn.style.background = '#141619'; alert("定位失敗：請檢查手機定位權限。"); },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        }
    </script>
