<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人共同即時地圖</title>
    
    <!-- 終極方案：全面改用 Cloudflare 與 Leaflet 官方全球極速節點，絕不被防火牆誤殺 -->
    <link rel="stylesheet" href="https://bdstatic.com" />
    <link rel="stylesheet" href="https://bootcdn.net" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100%;
            background-color: #f5f5f5; 
        }
        /* 房間提示標籤 */
        .room-info {
            position: absolute;
            top: 10px;
            left: 60px;
            z-index: 1000;
            background: white;
            padding: 6px 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 顯示當前房間名稱 -->
    <div class="room-info">當前房間：<span id="room-name">預設房間</span></div>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <!-- 核心通訊與全球通用加速節點 JavaScript 庫 -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://bdstatic.com"></script>
    <script src="https://bootcdn.net"></script>

    <script>
        // 1. 連線至伺服器
        const socket = io();

        // 取得房間名稱
        const urlParams = new URLSearchParams(window.location.search);
        const currentRoom = urlParams.get('room') || 'lobby';
        document.getElementById('room-name').innerText = currentRoom;

        // 2. 初始化地圖
        const map = L.map('map').setView([23.6978, 120.9605], 8);
        
        // 載入全球通用的基本地圖圖層
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OSM'
        }).addTo(map);

        // 3. 圖層管理
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        const localShapes = {};

        // 4. 配置標準畫圖工具列
        const drawControl = new L.Control.Draw({
            draw: {
                polyline: true,
                polygon: true,
                rectangle: true,
                circle: true,
                marker: false,
                circlemarker: false
            },
            edit: {
                featureGroup: drawnItems,
                remove: true
            }
        });
        map.addControl(drawControl);

        // 5. 加入房間
        socket.emit('join', { room: currentRoom });

        // 6. 接收舊的圖形
        socket.on('init-shapes', (shapesList) => {
            shapesList.forEach(shapeData => {
                drawRemoteShape(shapeData);
            });
        });

        // 7. 使用者畫好新圖形
        map.on(L.Draw.Event.CREATED, function (e) {
            const layer = e.layer;
            const type = e.layerType;
            
            const shapeId = 'shape_' + Math.random().toString(36).substr(2, 9);
            layer.shapeId = shapeId;
            drawnItems.addLayer(layer);

            const shapePayload = {
                id: shapeId,
                type: type,
                properties: {}
            };

            if (type === 'circle') {
                shapePayload.latlng = layer.getLatLng();
                shapePayload.radius = layer.getRadius();
            } else {
                shapePayload.latlngs = layer.getLatLngs();
            }

            localShapes[shapeId] = layer;
            socket.emit('shape:add', shapePayload);
        });

        // 8. 監聽更新
        socket.on('shape:added', (shapeData) => {
            if (localShapes[shapeData.id]) return; 
            drawRemoteShape(shapeData);
        });

        // 9. 監聽刪除
        socket.on('shape:removed', (id) => {
            const layer = localShapes[id];
            if (layer) {
                drawnItems.removeLayer(layer);
                delete localShapes[id];
            }
        });

        // 繪製其他人圖形的輔助功能
        function drawRemoteShape(shapeData) {
            let remoteLayer;
            if (shapeData.type === 'circle') {
                remoteLayer = L.circle(shapeData.latlng, { radius: shapeData.radius });
            } else if (shapeData.type === 'rectangle') {
                remoteLayer = L.rectangle(shapeData.latlngs);
            } else if (shapeData.type === 'polygon') {
                remoteLayer = L.polygon(shapeData.latlngs);
            } else if (shapeData.type === 'polyline') {
                remoteLayer = L.polyline(shapeData.latlngs);
            }

            if (remoteLayer) {
                remoteLayer.shapeId = shapeData.id;
                remoteLayer.setStyle({ color: '#e74c3c', weight: 4 });
                drawnItems.addLayer(remoteLayer);
                localShapes[shapeData.id] = remoteLayer;
            }
        }
    </script>
</body>
</html>
