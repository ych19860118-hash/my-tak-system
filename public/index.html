<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Web-TAK 數位地圖協作</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
    #map { height: 100%; width: 100%; }
    .action-panel { display: flex; flex-direction: column; gap: 8px; min-width: 150px; }
    .btn-del { color: white; background: #ff4d4f; border: none; padding: 5px; cursor: pointer; }
    .btn-edit { color: white; background: #1890ff; border: none; padding: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    const map = L.map('map').setView([25.0330, 121.5654], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const drawnItems = new L.FeatureGroup().addTo(map);
    const socket = io();
    
    // 登入
    const username = prompt("請輸入名稱:");
    const room = prompt("請輸入房間號碼:");
    socket.on('connect', () => socket.emit('join', { username, room }));

    // 繪圖工具
    const drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: { marker: true, polyline: true, polygon: true, circle: true, rectangle: true }
    });
    map.addControl(drawControl);

    // 繪製完成處理
    map.on(L.Draw.Event.CREATED, function (e) {
      const layer = e.layer;
      const shapeData = {
        id: Date.now().toString(),
        type: e.layerType,
        data: layer.toGeoJSON().geometry,
        radius: layer.getRadius ? layer.getRadius() : null,
        properties: { name: "新物件", color: "#3388ff" }
      };
      bindLayerInteraction(layer, shapeData);
      drawnItems.addLayer(layer);
      socket.emit('shape:add', shapeData);
    });

    // 核心互動邏輯：整合編輯與刪除
    function bindLayerInteraction(layer, shape) {
      layer.options.id = shape.id;
      layer.setStyle({ color: shape.properties.color });

      layer.on('click', function() {
        const panel = document.createElement('div');
        panel.className = 'action-panel';
        panel.innerHTML = `
          <strong>${shape.properties.name}</strong>
          <input type="text" id="ipt-name" value="${shape.properties.name}">
          <input type="color" id="ipt-color" value="${shape.properties.color}">
          <button class="btn-edit" id="btn-save">更新屬性</button>
          <button class="btn-del" id="btn-del">刪除圖形</button>
        `;

        layer.bindPopup(panel).openPopup();

        // 儲存更新
        panel.querySelector('#btn-save').onclick = () => {
          shape.properties.name = panel.querySelector('#ipt-name').value;
          shape.properties.color = panel.querySelector('#ipt-color').value;
          layer.setStyle({ color: shape.properties.color });
          layer.closePopup();
          socket.emit('shape:update', shape);
        };

        // 刪除邏輯
        panel.querySelector('#btn-del').onclick = () => {
          if (confirm("確定要刪除這個圖形嗎？")) {
            drawnItems.removeLayer(layer);
            socket.emit('shape:remove', shape.id);
          }
        };
      });
    }

    // 編輯同步
    map.on('draw:edited', (e) => {
      e.layers.eachLayer(layer => {
        socket.emit('shape:update', { id: layer.options.id, data: layer.toGeoJSON().geometry, radius: layer.getRadius ? layer.getRadius() : null });
      });
    });

    // 接收同步 (新增、更新、刪除)
    socket.on('shape:added', renderShape);
    socket.on('shape:removed', (id) => {
      drawnItems.eachLayer(l => { if(l.options.id === id) drawnItems.removeLayer(l); });
    });

    function renderShape(shape) {
      let layer;
      if (shape.type === 'circle') layer = L.circle(shape.data.coordinates.reverse(), { radius: shape.radius });
      else if (shape.type === 'rectangle' || shape.type === 'polygon') layer = L.polygon(shape.data.coordinates[0].map(c => c.reverse()));
      else if (shape.type === 'marker') layer = L.marker(shape.data.coordinates.reverse());
      
      if (layer) {
        bindLayerInteraction(layer, shape);
        layer.addTo(drawnItems);
      }
    }
  </script>
</body>
</html>
